<style>
  :root { color-scheme: dark; --acc:#7c5cff; --acc2:#22b8a6; --ok:#36c46a; --bad:#ff6b6b; }

  .top { position: sticky; top: 0; z-index: 5; display: flex; align-items: center; gap: .7rem; padding: .55rem .9rem;

  #trackChip.vibe { background: #2a2350; border-color: #7c5cff66; color: #d8ccff; }
  #trackChip.code { background: #14322a; border-color: #22b8a666; color: #b7ecde; }
  .tbtn { font: inherit; color: #fff; background: #ffffff14; border: 1px solid #ffffff2e; border-radius: .5rem; padding: .35rem .6rem; cursor: pointer; text-decoration: none; }
  .tbtn:hover { background: #ffffff24; }
  .layout { display: flex; gap: 0; align-items: stretch; min-height: calc(100vh - 49px); }
  /* Sidebar */
  .side { width: 290px; flex-shrink: 0; border-right: 1px solid #ffffff14; padding: .8rem .6rem 2rem; overflow-y: auto; }
  .mod { margin-bottom: .5rem; }
  .mod h3 { font-size: .76rem; text-transform: uppercase; letter-spacing: 1.3px; opacity: .55; margin: .9rem .4rem .35rem; }
  .lk { display: flex; align-items: center; gap: .5rem; padding: .5rem .55rem; border-radius: .55rem; cursor: pointer; font-size: .9rem; width: 100%; text-align: left; border: 0; background: none; color: inherit; font-family: inherit; }

  .concept { font-size: .9rem; opacity: .85; border-left: 3px solid var(--acc2); padding: .15rem .6rem; margin: .1rem 0 .2rem; }
  .teach { line-height: 1.6; font-size: .97rem; }
  .teach p { margin: .5rem 0; }
  .teach code { background: #ffffff18; padding: .05rem .35rem; border-radius: .3rem; font-size: .9em; }
  .teach .k { color: #ffd76a; font-weight: 600; }
  .box { border-radius: .7rem; padding: .7rem .85rem; margin: .8rem 0; border: 1px solid #ffffff1c; }
  .ai { background: linear-gradient(180deg, #2a2350, #1c1838); border-color: #7c5cff55; }
  .ai.vibe { background: linear-gradient(180deg, #21304a, #16202f); border-color: #22b8a655; }
  .ai .h { display: flex; align-items: center; gap: .5rem; font-weight: 700; color: #c9b8ff; margin-bottom: .35rem; }
  .ai.vibe .h { color: #8fe0d4; }
  .ai .prompt { background: #0c0e16; border: 1px dashed #7c5cff66; border-radius: .5rem; padding: .5rem .6rem; font-size: .88rem; font-style: italic; color: #e7e0ff; white-space: pre-wrap; }
  .ai.vibe .prompt { border-color: #22b8a666; color: #dbfff5; }
  .ai .copy { margin-top: .45rem; font-size: .8rem; }
  .verify { margin-top: .5rem; font-size: .88rem; background: #0c1a16; border: 1px solid #22b8a644; border-radius: .5rem; padding: .45rem .6rem; color: #c8efe0; }
  /* Onglets de piste */
  .tracks { display: flex; gap: .5rem; margin: .2rem 0 .6rem; }
  .track { flex: 1; display: flex; flex-direction: column; align-items: center; gap: .05rem; font: inherit; cursor: pointer;
           background: #ffffff10; border: 1px solid #ffffff24; border-radius: .6rem; padding: .45rem .5rem; color: #cfd3e0; }
  .track small { font-size: .72rem; opacity: .7; font-weight: 400; }
  .track:hover { background: #ffffff1c; }
  .track:focus-visible, .btn:focus-visible, .tbtn:focus-visible, .lk:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
  .track.on { font-weight: 800; color: #fff; }
  #tab-code.on { background: linear-gradient(180deg,#14322a,#0e2620); border-color: var(--acc2); color: #d6fff0; }
  #tab-vibe.on { background: linear-gradient(180deg,#2a2350,#1c1838); border-color: var(--acc); color: #e7defc; }
  /* Playground */
  .pg { display: grid; grid-template-columns: 1fr 340px; gap: .7rem; margin: .8rem 0; }
  @media (max-width: 760px){ .pg { grid-template-columns: 1fr; } .side { position: fixed; left: 0; top: 49px; bottom: 0; background: #11121c; transform: translateX(-100%); transition: transform .25s; z-index: 6; } .side.open { transform: none; } .menuBtn { display: inline-block !important; } .tracks { position: sticky; top: 49px; z-index: 4; background: #0c0e16; } }
  .menuBtn { display: none; }
  .editor { width: 100%; min-height: 230px; resize: vertical; font-family: ui-monospace, "Cascadia Code", Menlo, Consolas, monospace; font-size: 13px;
            line-height: 1.5; color: #e8eef7; background: #0b0d14; border: 1px solid #ffffff24; border-radius: .6rem; padding: .6rem .7rem; tab-size: 2; white-space: pre; overflow-wrap: normal; }
  .out { display: flex; flex-direction: column; gap: .5rem; }
  .stage { background: #0b0d14; border: 1px solid #ffffff24; border-radius: .6rem; padding: .4rem; display: flex; align-items: center; justify-content: center; }
  canvas.cv { width: 100%; height: auto; image-rendering: auto; border-radius: .3rem; background: #11151f; }
  .console { background: #07090f; border: 1px solid #ffffff1c; border-radius: .5rem; padding: .45rem .6rem; font-family: ui-monospace, monospace; font-size: 12.5px; min-height: 54px; max-height: 130px; overflow: auto; white-space: pre-wrap; color: #b9e6c8; }
  .pgbtns { display: flex; flex-wrap: wrap; gap: .45rem; margin: .2rem 0 .1rem; }
  .btn { font: inherit; color: #fff; background: #ffffff16; border: 1px solid #ffffff2e; border-radius: .5rem; padding: .45rem .7rem; cursor: pointer; }
  .btn:hover { background: #ffffff26; } .btn:active { transform: translateY(1px); }
  .btn.run { background: var(--acc); color: #11101e; border-color: transparent; font-weight: 800; }
  .banner { border-radius: .55rem; padding: .55rem .7rem; margin: .6rem 0; font-weight: 600; display: none; }
  .banner.show { display: block; }
  .banner.good { background: #16432b; border: 1px solid var(--ok); color: #b6f0c8; }
  .banner.bad { background: #45201f; border: 1px solid #ff6b6b66; color: #ffc9c9; }
  .nav { display: flex; justify-content: space-between; gap: .5rem; margin-top: 1.3rem; }
  /* Mentor */
  .mentor { display: flex; gap: .6rem; align-items: flex-start; background: #ffffff0d; border: 1px solid #ffffff1c; border-radius: .7rem; padding: .6rem .7rem; margin: .8rem 0 .4rem; }
  .mentor .av { font-size: 1.7rem; line-height: 1; flex-shrink: 0; }
  .mentor .bubble { font-size: .92rem; line-height: 1.45; }
  .mentor .who { font-weight: 700; color: #8fe0d4; font-size: .82rem; }
  .hide { display: none; }

  <div class="top">
    <button class="tbtn menuBtn" aria-label="Ouvrir le menu des leçons" aria-expanded="false" aria-controls="side" onclick="toggleSide()">☰</button>

    <span class="sp"></span>
    <span class="chip" id="trackChip">Piste</span>

  <div class="layout">
    <aside class="side" id="side">

      <div class="badges" id="badges" title="Tes badges"></div>
      <nav id="toc"></nav>

    <main class="main">
      <section class="lesson" id="lesson"></section>
    </main>

<script>
/* ============================================================================
   L'ATELIER — apprendre à créer les jeux d'AwemA, en DEUX pistes au choix :
     • 🧑‍💻 CODING   : on écrit le vrai code soi-même (comprendre le code + les méthodes).
     • 🪄 VIBECODING : on dirige une IA de code et on VÉRIFIE (gérer une IA, apprendre en faisant).
   100% local, hors-ligne. Bac à sable de code en direct + progression sauvegardée.
   Guide : Awa, mentor IA. Ancrage culturel ouest-africain (Akwaba, griot, mil, cacao…).

   ─────────────────────────────────────────────────────────────────────────
   ▶▶▶  COMMENT FAIRE GROSSIR CE TUTO À CHAQUE NOUVEAU JEU  (lis-moi !)  ◀◀◀
   Règle de croissance : un nouveau jeu n'est PAS terminé tant que son étude de
   cas bi-piste n'est pas ajoutée ici (module "jeux"). Procédure :
     1. Repérer LA méthode authentique enseignable du jeu (keyMethod) : boucle à
        dt borné, fonction pure, FSM, structure de données, formule de stat
        bornée, autorité serveur… (la prendre dans le VRAI code du jeu).
     2. En faire une démo réduite n'utilisant QUE les primitives du bac à sable.
     3. Écrire la piste CODING (teach + task + check OBJECTIF : FAUX sur le starter à compléter, VRAI sur la solution).
     4. Écrire la piste VIBECODING avec la boucle Spécifier→Prédire→Coller→
        Vérifier→Itérer, et 1 à 3 PIÈGES IA RÉELS du jeu (jamais inventés :
        prends-les dans la revue de code / la cartographie). Le starter vibe = le
        code "écrit par l'IA" volontairement bugué ; le check valide la correction.
     5. Ajouter une entrée dans ATELIER_CASES ci-dessous (dette visible).
     6. Bumper le cache du service worker (engine/sw.js : awema-vXX → vXX+1),
        sinon les visiteurs gardent l'ancienne version.

   GABARIT À COPIER (nouvelle leçon, à pousser dans le module "jeux") :
   { id:"jX", title:"…", xp:20, concept:"… (le concept commun aux 2 pistes)",
     coding: {
       mode:"code",            // 'code' | 'canvas' | 'anim' (descriptif ; leçon de lecture = simplement sans check)
       intro:"… (phrase d'Awa)",
       teach:`<p>…</p>`,        // HTML pédagogique, échapper &lt; &gt;
       prompt:"… (un bon prompt modèle)",
       starter:`… code de départ (souvent avec un TODO) …`,
       task:"… la mission …",
       hint:"… l'indice …",
       solution:`… une solution …`,   // ou null
       check:(a)=> { throw "TODO: check objectif (booléen sur a.logs / a.calls(Set) / a.src / a.pix) — FAUX sur le starter, VRAI sur la solution"; } },
     vibecoding: {
       mode:"code",
       intro:"… (Awa rassure : se tromper en pilotant est normal)",
       teach:`<p>… le concept + le PIÈGE IA réel …</p>`,
       missionType:"… ex: Repérer le bug + corriger …",
       examplePrompt:"… le prompt CADRÉ à envoyer à l'IA …",
       whatToVerify:"… la check-list de vérification du code IA …",
       starter:`… code "écrit par l'IA" VOLONTAIREMENT bugué (un vrai piège IA observé sur ce jeu) …`,
       task:"… corrige / réécris …",
       hint:"… l'indice …",
       solution:`… la version corrigée …`,
       check:(a)=> { throw "TODO: check qui valide la correction — FAUX sur le starter bugué, VRAI sur la solution"; } },

   CONTRAT DU BAC À SABLE — un starter/solution n'a accès QU'À :
     print(...), clear(), rand(a,b), loop(fn(dt)), onKey(fn(key)), onClick(fn(x,y)),
     et les variables  ctx (contexte 2D), W=320, H=200.
     AUCUN DOM (document/addEventListener), AUCUN import, AUCUN fetch, PAS de
     requestAnimationFrame brut (utiliser loop). Math/JSON sont disponibles.
   check(api) reçoit api = { logs:[], calls:Set, error, src:"", W, H, ctx, pix(x,y) }.
   • api.calls ne contient QUE les 6 primitives instrumentées (print/clear/rand/loop/onKey/onClick) ;
     pour détecter une fonction définie par l'élève, teste a.src ou a.logs, jamais a.calls.
   • Un check par regex sur a.src ne doit JAMAIS matcher un token présent dans la PROSE du starter
     (commentaires / print) : ancre le motif sur de la syntaxe de code, sinon la regex matche le texte.
   ========================================================================== */

/* Registre déclaratif : quels jeux ont déjà leur étude de cas (dette visible). */
const ATELIER_CASES = [
  { gameId:"voraces",  keyMethod:"Boucle à dt borné + stat dérivée d'une masse (plancher)", lessons:["d2","j2"] },
  { gameId:"lignees",  keyMethod:"Fonction pure (clone) + hasard déterministe (seed)",      lessons:["j1","j1b"] },
  { gameId:"sables",   keyMethod:"Machine à états (u.state + switch)",                       lessons:["j3"] },
  { gameId:"echecs",   keyMethod:"Plateau plat idx=r*8+f + génération glissante",            lessons:["j4"] },
  { gameId:"multi",    keyMethod:"Lobby duelWaiting[jeu] + serveur recalcule l'Indice",      lessons:["j5"] },
  // + à chaque nouveau jeu : pousser { gameId, keyMethod, lessons:["jX"] } ici.
];

const PRAISE = ["Akwaba au club des codeurs ! 🎉", "Magnifique, ça marche !", "Tu progresses vite 💪",
  "Voilà du beau code !", "Le griot racontera tes exploits 🥁", "Impeccable, on continue !"];
const ENCOURAGE = ["Presque ! Relis l'énoncé tranquillement.", "Pas grave, on apprend en se trompant 🙂",
  "Essaie encore — clique sur 💡 Indice si tu bloques.", "Tu y es presque, regarde la console."];

/* --- Le programme : modules → leçons ---
   Chaque leçon : { id, title, xp, concept, coding:{...}, vibecoding:{...} }.
   coding/vibecoding partagent : mode, intro, teach, starter, task, hint, solution, check.
   vibecoding ajoute : missionType, examplePrompt, whatToVerify (rôle du "prompt"). */
const COURSE = [
{ id:"start", title:"Bienvenue", icon:"👋", lessons:[
  { id:"s1", title:"Akwaba ! Comment ça marche", xp:10,
    concept:"Le bac à sable : print() affiche, ▶ lance, la console montre le résultat. Et il y a DEUX façons d'avancer : écrire le code, ou piloter l'IA et vérifier.",
    coding:{ mode:"code",
      intro:"Salut, moi c'est Awa, ton guide. Ici on apprend en FAISANT : tu écris du vrai code, tu cliques ▶, tu vois le résultat tout de suite !",
      teach:`<p>Bienvenue dans <b>l'Atelier</b> ! Tu vas apprendre à <span class="k">programmer</span> en construisant les jeux de la plateforme.</p>
        <p>À droite, un <b>bac à sable</b> : écris du code, clique <span class="k">▶ Lancer</span>, et la console affiche le résultat. <code>print(...)</code> affiche un message.</p>
        <p>👉 Choisis ta piste avec les onglets ci-dessus. En <b>Coding</b>, tu tapes le code. Ta 1re mission : affiche un message, puis ton prénom.</p>`,
      prompt:`Comment afficher un message à l'écran en JavaScript ? Donne un exemple simple avec une fonction print().`,
      starter:`print("Akwaba, le monde !");\n// ajoute une 2e ligne avec ton prénom :\n`,
      task:"Affiche deux messages (deux print), le 2e contient ton prénom.",
      hint:"Écris une 2e ligne, par exemple : print(\"Awa\");",
      solution:`print("Akwaba, le monde !");\nprint("Awa");`,
      check:(a)=> a.logs.length>=2 },
    vibecoding:{ mode:"code",
      intro:"En Vibecoding, tu ne tapes pas forcément tout : tu PILOTES une IA et tu VÉRIFIES. Se tromper en dirigeant l'IA, c'est normal — ton métier, c'est de contrôler.",
      teach:`<p>La boucle du vibecodeur, à chaque leçon : <span class="k">SPÉCIFIER</span> (demander précisément) → <span class="k">PRÉDIRE</span> (ce que ça devrait afficher) → <span class="k">COLLER &amp; LANCER</span> (le code de l'IA) → <span class="k">VÉRIFIER</span> (comparer à ta prédiction) → <span class="k">ITÉRER</span> (corriger / mieux demander).</p>
        <p>👉 Ici, l'IA t'a donné deux lignes (déjà dans l'éditeur). <b>Prédis</b> ce que la console va afficher, puis clique ▶ pour vérifier.</p>`,
      missionType:"Prédire la sortie + coller & lancer",
      examplePrompt:`En JavaScript, dans un bac à sable qui ne fournit que print(), écris deux lignes : la 1re affiche un accueil, la 2e affiche mon prénom. Donne uniquement les deux lignes.`,
      whatToVerify:"La console affiche EXACTEMENT deux lignes, dans l'ordre attendu, sans erreur rouge — comme ta prédiction.",
      starter:`// Code "écrit par l'IA" — prédis la sortie AVANT de lancer :\nprint("Akwaba sur AwemA !");\nprint("Awa");\n`,
      task:"Prédis les 2 lignes, puis lance pour vérifier.",
      hint:"Le 1er print affiche l'accueil, le 2e le prénom. Lance et compare.",
      solution:null,
      check:(a)=> a.logs.length>=2 } },
]},
{ id:"bases", title:"Les bases du code", icon:"🧱", lessons:[
  { id:"b1", title:"Les variables : ranger des valeurs", xp:15,
    concept:"Variables et calcul (let, *, /) : le total de fèves de cacao = 3 sacs × 12.",
    coding:{ mode:"code",
      intro:"Une variable, c'est comme un sac étiqueté où tu ranges une valeur pour t'en servir plus tard.",
      teach:`<p>Une <span class="k">variable</span> garde une valeur sous un nom, avec <code>let</code> : <code>let sacs = 3;</code>.</p>
        <p>On calcule avec <code>+</code> <code>-</code> <code>*</code> (multiplier) <code>/</code> (diviser).</p>
        <p>👉 Un planteur a <b>3 sacs</b> de <b>12 fèves</b> de cacao. Affiche le <b>total</b>.</p>`,
      prompt:`En JavaScript, comment créer des variables et afficher le résultat d'une multiplication ?`,
      starter:`let sacs = 3;\nlet parSac = 12;\n// affiche le total (sacs multiplié par parSac) :\n`,
      task:"Affiche 36 (le total), calculé à partir des variables.",
      hint:"print(sacs * parSac);",
      solution:`let sacs = 3;\nlet parSac = 12;\nprint(sacs * parSac);`,
      check:(a)=> a.logs.includes("36") },
    vibecoding:{ mode:"code",
      intro:"On apprend à SPÉCIFIER (entrées/sortie) et à PRÉDIRE avant de lancer. Une IA confond vite « additionner » et « multiplier ».",
      teach:`<p>Le piège classique : l'IA écrit <code>+</code> au lieu de <code>*</code>. <b>Prédis</b> : 3 × 12 = ? Puis lance le code de l'IA et regarde s'il a multiplié… ou pas.</p>
        <p>Si ce n'est pas 36, <span class="k">corrige l'opérateur</span> et relance.</p>`,
      missionType:"Prédire la sortie puis repérer le bug d'opérateur",
      examplePrompt:`En JavaScript (bac à sable avec print uniquement), crée sacs=3 et parSac=12, puis affiche leur PRODUIT. Sortie attendue : 36. N'invente pas d'autres nombres.`,
      whatToVerify:"Le code multiplie (et non additionne ni concatène) ; valeurs 3 et 12 ; sortie = 36, pas 15 ni \"312\".",
      starter:`// Code "écrit par l'IA" — prédis 36, puis vérifie :\nlet sacs = 3;\nlet parSac = 12;\nprint(sacs + parSac);   // l'IA a-t-elle multiplié ?\n`,
      task:"Prédis 36, lance, et corrige l'opérateur si besoin pour obtenir 36.",
      hint:"« doubler/total » = multiplier : remplace + par *.",
      solution:`let sacs = 3;\nlet parSac = 12;\nprint(sacs * parSac);`,
      check:(a)=> a.logs.includes("36") } },
  { id:"b2", title:"Les conditions : si... alors...", xp:15,
    concept:"if/else et la comparaison >= : riche/pauvre selon l'or.",
    coding:{ mode:"code",
      intro:"Un jeu doit DÉCIDER : si tu as assez d'or, tu peux construire. C'est le rôle de if/else.",
      teach:`<p>Avec <span class="k">if / else</span>, le programme choisit : <code>if (or &gt;= 5) { ... } else { ... }</code> — <code>&gt;=</code> = « supérieur ou égal ».</p>
        <p>👉 <code>or</code> vaut 7. Affiche <b>"riche"</b> si <code>or</code> ≥ 5, sinon <b>"pauvre"</b>.</p>`,
      prompt:`Montre un exemple de if/else en JavaScript qui affiche un mot différent selon une valeur.`,
      starter:`let or = 7;\n// si or >= 5 -> "riche", sinon -> "pauvre"\n`,
      task:"Affiche \"riche\" (car or vaut 7).",
      hint:`if (or >= 5) { print("riche"); } else { print("pauvre"); }`,
      solution:`let or = 7;\nif (or >= 5) { print("riche"); } else { print("pauvre"); }`,
      check:(a)=> a.logs.some(l=>/riche/i.test(l)) && !a.logs.some(l=>/pauvre/i.test(l)) },
    vibecoding:{ mode:"code",
      intro:"Les IA se trompent souvent sur les bornes : > au lieu de >=. Le bon réflexe : tester le CAS LIMITE.",
      teach:`<p>Ici l'or vaut exactement <b>5</b> — la frontière. La règle veut que <b>5 donne "riche"</b>. Mais l'IA a écrit <code>or &gt; 5</code> (strictement supérieur) → 5 tombe à tort dans "pauvre".</p>
        <p>👉 <b>Prédis</b> ce que devrait afficher or=5, lance, puis <span class="k">corrige l'opérateur</span> en <code>&gt;=</code>.</p>`,
      missionType:"Prédire puis repérer le bug de borne (> vs >=)",
      examplePrompt:`En JavaScript, écris un if/else : si or est supérieur OU ÉGAL à 5, affiche "riche", sinon "pauvre". Attention : 5 doit donner "riche".`,
      whatToVerify:"Teste mentalement or=5 ET or=7. Si l'IA a mis > au lieu de >=, le cas limite 5 casse. Corrige en >=.",
      starter:`// Code "écrit par l'IA" — or vaut la frontière (5). Prédis le mot attendu :\nlet or = 5;\nif (or > 5) { print("riche"); } else { print("pauvre"); }   // > au lieu de >= ?\n`,

{ id:"dessin", title:"Dessiner & animer", icon:"🎨", lessons:[
  { id:"d1", title:"Dessiner sur la toile", xp:20,

    coding:{ mode:"canvas",
      intro:"Place au dessin ! Le canvas est ta toile. ctx est ton pinceau : couleur, rectangles, cercles.",

        <p>Un cercle : <code>ctx.beginPath(); ctx.arc(x, y, rayon, 0, Math.PI*2); ctx.fill();</code></p>

      prompt:`Comment dessiner un cercle plein d'une couleur donnée sur un canvas avec le contexte 2D ?`,
      starter:`// fond vert (déjà fait) :\nctx.fillStyle = "#0f7a4e";\nctx.fillRect(0, 0, W, H);\n\n// à toi : un cercle ORANGE au centre (W/2, H/2), rayon 34\n`,

      check:(a)=>{ const c=a.pix(a.W/2|0,a.H/2|0); return c[0]>180 && c[1]>70 && c[1]<170 && c[2]<90; } } },
  { id:"d2", title:"La boucle de jeu : ça bouge ! (dt)", xp:25,
    concept:"loop(dt) : effacer → bouger → redessiner, vitesse × dt — le cœur de Voraces.",
    coding:{ mode:"anim",
      intro:"Le secret de TOUT jeu vidéo : redessiner très vite, en bougeant un peu à chaque image. C'est la boucle de jeu.",
      teach:`<p><code>loop(function(dt){ ... })</code> tourne ~60 fois/seconde (<code>dt</code> = temps écoulé, en secondes). À chaque image : on <span class="k">efface</span>, on <span class="k">bouge</span> (<code>x += vitesse * dt</code>), on <span class="k">redessine</span>.</p>
        <p>Multiplier par <code>dt</code> = même vitesse sur un mobile lent ou un PC rapide. C'est <code>update(dt)</code> de Voraces. 👉 Lance, puis change le <code>120</code> et relance !</p>`,
      prompt:`Comment animer un cercle qui se déplace sur un canvas avec une boucle ? Donne la structure (dt en secondes).`,
      starter:`let x = 0;\nloop(function(dt){\n  clear();                 // efface l'image précédente\n  x = x + 120 * dt;        // avance (vitesse x temps)\n  if (x > W) x = 0;        // revient à gauche\n  ctx.fillStyle = "#e8702a";\n  ctx.beginPath();\n  ctx.arc(x, H/2, 16, 0, Math.PI*2);\n  ctx.fill();\n});`,
      task:"Lance l'animation (utilise loop). Bonus : change la vitesse 120.",
      hint:"Clique ▶ Lancer — puis amuse-toi à changer la vitesse 120.",
      solution:null,
      check:(a)=> a.calls.has("loop") },
    vibecoding:{ mode:"anim",
      intro:"LE piège n°1 des IA sur une boucle : oublier × dt (jeu dépendant du matériel) ou oublier clear() (traînées).",
      teach:`<p>L'IA a écrit <code>x = x + 2</code> (par image, pas par seconde) et a <b>oublié <code>clear()</code></b> → le cercle laisse une traînée et va trop vite/trop lent selon la machine.</p>
        <p>👉 Lance, observe la traînée, puis <span class="k">remets <code>clear()</code> en 1re ligne</span> et passe à <code>x += 120 * dt</code>.</p>`,
      missionType:"Repérer le bug « sans dt » / « sans clear »",
      examplePrompt:`En JS pour un bac à sable avec loop(fn(dt)) (dt en SECONDES), clear(), ctx, W, H : anime un cercle à 120 pixels par SECONDE. Le déplacement doit être x += 120 * dt, et clear() doit être la 1re instruction de la boucle. Pas de requestAnimationFrame brut.`,
      whatToVerify:"Y a-t-il × dt sur CHAQUE déplacement ? clear() en premier (sinon traînée) ? Pas de requestAnimationFrame brut ? (Dans le vrai Voraces, l'IA oublie aussi le /1000 et le plafond Math.min(dt,0.033).)",
      starter:`// Code "écrit par l'IA" — d'où viennent la traînée et la mauvaise vitesse ?\nlet x = 0;\nloop(function(dt){\n  x = x + 2;            // par image (sans dt) → dépend du matériel\n  if (x > W) x = 0;\n  ctx.fillStyle = "#e8702a";\n  ctx.beginPath(); ctx.arc(x, H/2, 16, 0, Math.PI*2); ctx.fill();\n  // clear() manquant → traînée\n});`,
      task:"Ajoute clear() en 1re ligne de la boucle et passe à x += 120 * dt.",
      hint:"1re ligne de loop : clear(); puis x = x + 120 * dt;",
      solution:`let x = 0;\nloop(function(dt){\n  clear();\n  x = x + 120 * dt;\n  if (x > W) x = 0;\n  ctx.fillStyle = "#e8702a";\n  ctx.beginPath(); ctx.arc(x, H/2, 16, 0, Math.PI*2); ctx.fill();\n});`,
      check:(a)=> a.calls.has("loop") && a.calls.has("clear") && /\*\s*dt|dt\s*\*/.test(a.src) } },
  { id:"d3", title:"Réagir au joueur : le clic", xp:25,

      whatToVerify:"Le code passe bien une fonction à onClick (et non un écouteur sur « canvas ») ? Il utilise x,y directement, sans recalcul ? La variable canvas (inexistante ici) a disparu ? Le cercle apparaît sous le curseur ?",

{ id:"jeux", title:"Concevoir les jeux d'AwemA", icon:"🎮", lessons:[
  { id:"j1", title:"Lignées : le tour par tour (fonction pure)", xp:20,
    concept:"resoudre(état, ordres) → NOUVEL état, sans modifier l'entrée : une fonction PURE (comme resolveTick de Lignées).",
    coding:{ mode:"code",
      intro:"Regardons comment est pensé chaque jeu. D'abord Lignées : tu donnes des ordres, puis on « résout » le tour avec une fonction PURE.",
      teach:`<p><b>Idée</b> : une <span class="k">fonction pure</span> ne touche jamais à ce qu'on lui donne. La 1re ligne <b>clone</b> l'état, on modifie la copie, on renvoie du neuf : <code>nouvelÉtat = resoudre(état, ordres)</code>.</p>
        <p>Avantage : on peut rejouer un tour, l'annuler, le simuler — et le serveur obtient le même résultat que toi. Le vrai moteur fait <code>structuredClone(state)</code> en 1re ligne.</p>
        <p>👉 Ici le clone est CASSÉ (<code>const s = etat;</code> partage l'objet). Corrige-le pour que l'ANCIEN état reste à 100.</p>`,
      prompt:`En JavaScript, écris resoudre(etat, ordres) PUR : clone l'état en profondeur, applique des phases (revenus, puis levée qui coûte or ET grain), renvoie un nouvel état. L'original ne doit pas changer.`,
      starter:`clear();
function resoudre(etat, ordres){
  const s = etat;            // ❌ ceci PARTAGE l'objet ! clone-le en PROFONDEUR
  const log = [];
  s.or += s.cites * 20; log.push("revenus +" + (s.cites*20) + " or");   // phase REVENUS
  for (const o of ordres){                                              // phase LEVÉE (coûte or ET grain)
    if (o.type === "LEVEE" && s.or >= o.n && s.grain >= o.n){ s.or -= o.n; s.grain -= o.n; s.soldats += o.n; log.push("levée de " + o.n); }
  }
  s.tick += 1;
  return { etat: s, log };
}
let monde = { tick:0, or:100, grain:100, soldats:50, cites:2 };
const res = resoudre(monde, [{ type:"LEVEE", n:30 }]);
res.log.forEach(l => print("tick " + res.etat.tick + " | " + l));
print("nouvel or = " + res.etat.or + " | ANCIEN or = " + monde.or + " (doit rester 100 si pur)");`,
      task:"Clone l'état en profondeur pour que « ANCIEN or = 100 » s'affiche (l'original intact).",
      hint:"1re ligne : const s = JSON.parse(JSON.stringify(etat));",
      solution:`clear();
function resoudre(etat, ordres){
  const s = JSON.parse(JSON.stringify(etat));
  const log = [];
  s.or += s.cites * 20; log.push("revenus +" + (s.cites*20) + " or");
  for (const o of ordres){
    if (o.type === "LEVEE" && s.or >= o.n && s.grain >= o.n){ s.or -= o.n; s.grain -= o.n; s.soldats += o.n; log.push("levée de " + o.n); }
  }
  s.tick += 1;
  return { etat: s, log };
}
let monde = { tick:0, or:100, grain:100, soldats:50, cites:2 };
const res = resoudre(monde, [{ type:"LEVEE", n:30 }]);
res.log.forEach(l => print("tick " + res.etat.tick + " | " + l));
print("nouvel or = " + res.etat.or + " | ANCIEN or = " + monde.or + " (doit rester 100 si pur)");`,
      check:(a)=> a.logs.some(l=>/ANCIEN or = 100/.test(l)) },
    vibecoding:{ mode:"code",
      intro:"Le piège majeur des IA sur un moteur de jeu : MUTER l'état d'entrée. On vérifie la PURETÉ.",
      teach:`<p>L'IA a écrit <code>etat.or += 25</code> : elle <b>modifie l'objet d'origine</b>. Conséquence : impossible de rejouer, et client/serveur divergent.</p>
        <p>👉 <b>Prédis</b> : après l'appel, l'ancien <code>or</code> devrait-il valoir 80 ? Lance, constate qu'il a bougé, puis <span class="k">force le clone profond</span> et renvoie la copie.</p>`,
      missionType:"Repérer la mutation d'état + exiger la pureté",
      examplePrompt:`En JavaScript pur, écris resoudre(etat, ordre) PUR : il ne doit JAMAIS modifier l'objet etat reçu. Commence par cloner en PROFONDEUR (JSON.parse(JSON.stringify) ou structuredClone), modifie la copie, renvoie-la. Pour "commercer", ajoute 25 à l'or. Montre l'ancien et le nouvel or pour prouver l'intégrité.`,
      whatToVerify:"Le clone est-il PROFOND (pas {...etat}) ? L'ancien etat.or vaut-il TOUJOURS 80 après l'appel ? Deux appels identiques donnent-ils le même résultat ?",
      starter:`clear();
// Code "écrit par l'IA" — résout 'commercer' (+25 or). Mais est-il PUR ?
function resoudre(etat, ordre){
  if (ordre === "commercer"){ etat.or += 25; }   // ❌ mutation de l'entrée !
  return etat;
}
let monde = { or: 80 };
let apres = resoudre(monde, "commercer");
print("après : or = " + apres.or);
print("ANCIEN or = " + monde.or + " (doit rester 80 si la fonction est pure)");`,
      task:"Rends la fonction pure (clone profond) pour que « ANCIEN or = 80 ».",
      hint:"const s = JSON.parse(JSON.stringify(etat)); s.or += 25; return s;",
      solution:`clear();
function resoudre(etat, ordre){
  const s = JSON.parse(JSON.stringify(etat));
  if (ordre === "commercer"){ s.or += 25; }
  return s;
}
let monde = { or: 80 };
let apres = resoudre(monde, "commercer");
print("après : or = " + apres.or);
print("ANCIEN or = " + monde.or + " (doit rester 80 si la fonction est pure)");`,
      check:(a)=> a.logs.some(l=>/ANCIEN or = 80/.test(l)) } },
  { id:"j1b", title:"Lignées : le hasard MAÎTRISÉ (déterminisme)", xp:20,
    concept:"Remplacer Math.random par un hachage de seed+tick → même seed = même résultat (base du MP async et de l'anti-triche).",
    coding:{ mode:"code",
      intro:"Pour que le serveur ET ton navigateur tombent d'accord, le « hasard » d'un jeu ne doit PAS être vraiment aléatoire : il dérive d'une graine (seed).",
      teach:`<p>Deux ennemis du déterminisme : <code>Math.random()</code> et l'ordre non trié. Lignées choisit l'événement du tour par un <span class="k">hachage</span> de <code>seed</code> et <code>tick</code> (jamais de random), et trie ses parcours.</p>
        <p>👉 Le hachage est prêt ; complète la ligne <code>return</code> pour renvoyer un index 0, 1 ou 2 (<code>h % 3</code>). Même seed → même événement, à chaque lancement.</p>`,
      prompt:`En JavaScript pur, écris eventFor(seed, tick) qui choisit un événement parmi 3 de façon DÉTERMINISTE, sans Math.random : dérive le choix d'un hachage entier de seed et tick.`,

        <p>Une Tata (tour) <b>glisse</b> : on avance dans une direction tant qu'on est sur le plateau ; case vide → on continue ; <b>adverse → on prend puis on s'arrête</b> ; ami → on s'arrête sans prendre.</p>

      prompt:`Représente un échiquier par un tableau plat de 64 cases (idx=r*8+f, r=idx>>3, f=idx&7). Génère les cases d'une tour glissante : boucle while par direction, bornes sur r ET f, prise sur adverse puis break, stop sur ami.`,
      starter:`clear();
var b = new Array(64).fill(".");
function set(r, f, v){ b[r*8 + f] = v; }          // poser une pièce
set(4,3,"R"); set(4,6,"r"); set(1,3,"R");         // notre Tata (R), un ennemi (r minuscule), un ami (R)
var ROOK = [[-1,0],[1,0],[0,-1],[0,1]];            // 4 directions orthogonales
function genRook(idx){
  var r = idx >> 3, f = idx & 7, out = [];         // r = ligne, f = colonne
  for (var k = 0; k < ROOK.length; k++){
    var dr = ROOK[k][0], df = ROOK[k][1], rr = r + dr, ff = f + df;
    while (rr >= 0 && rr < 8 && ff >= 0 && ff < 8){ // bornes sur rr ET ff (sinon wrap-around d'un bord à l'autre)

      else { /* 👉 à toi : si p est ADVERSE (minuscule) -> out.push(ti) PUIS break ; si AMI -> break sans prendre */ }
      rr += dr; ff += df;
    }
  }
  return out;
}

  }
});`,

  return out;
}
var moves = genRook(4*8 + 3);
print("La Tata atteint " + moves.length + " cases (attendu : 11).");
var cell = Math.min(W, H) / 8;
loop(function(){
  for (var i = 0; i < 64; i++){
    var rr = i>>3, ff = i&7, x = ff*cell, y = rr*cell;
    ctx.fillStyle = ((rr+ff)%2) ? "#ab7c4f" : "#ecd8b6"; ctx.fillRect(x, y, cell-1, cell-1);
    if (moves.indexOf(i) >= 0){ ctx.fillStyle = "#0f7a4e"; ctx.beginPath(); ctx.arc(x+cell/2, y+cell/2, cell/6, 0, 7); ctx.fill(); }
    if (b[i] !== "."){ ctx.fillStyle = (b[i] === b[i].toUpperCase()) ? "#e8702a" : "#222"; ctx.beginPath(); ctx.arc(x+cell/2, y+cell/2, cell/3, 0, 7); ctx.fill(); }
  }
});`,

    vibecoding:{ mode:"code",
      intro:"LE bug classique sur tableau plat : le WRAP-AROUND (tester seulement l'index 0..63 → on déborde d'un bord à l'autre) et l'oubli du break.",
      teach:`<p>L'IA avance par index plat et ne teste <b>que</b> <code>0 &lt;= idx &lt;= 63</code> : un déplacement « gauche » depuis la colonne 0 saute sur la colonne 7 de la ligne d'avant. Et sans <code>break</code>, la tour saute par-dessus les pièces.</p>
        <p>👉 Réécris <code>genRook</code> avec <code>r = idx&gt;&gt;3</code>, <code>f = idx&amp;7</code>, des bornes sur <span class="k">r ET f</span>, et un <code>break</code> sur une pièce.</p>`,
      missionType:"Repérer le wrap-around + le break manquant",
      examplePrompt:`En JS pur, échiquier = tableau plat de 64 cases, idx = r*8 + f (r = idx>>3, f = idx&7). Génère les cases d'une tour glissante : pour chaque direction, avance tant que 0<=rr<8 ET 0<=ff<8 (vérifie rr ET ff SÉPARÉMENT, jamais seulement l'index, sinon wrap-around) ; case vide → continue, adverse → ajoute PUIS break, ami → break sans ajouter.`,
      whatToVerify:"Les bornes sont-elles testées sur rr ET ff (pas seulement idx 0..63) ? Y a-t-il un break après une pièce (la tour ne saute pas) ? La case amie est-elle non ajoutée ?",
      starter:`clear();
var b = new Array(64).fill(".");
function set(r, f, v){ b[r*8 + f] = v; }
set(4,0,"R"); set(4,6,"r");                    // Tata au bord gauche (colonne 0), ennemi à droite
var ROOK = [-8, 8, -1, 1];                      // l'IA avance par INDEX plat (haut/bas/gauche/droite)
function genRook(idx){
  var out = [];
  for (var k = 0; k < ROOK.length; k++){
    var cur = idx;
    while (true){
      cur += ROOK[k];
      if (cur < 0 || cur > 63) break;           // ❌ ne teste QUE l'index → wrap-around d'un bord à l'autre
      out.push(cur);                            // ❌ pas de break sur une pièce → saute par-dessus
    }
  }
  return out;
}
print("Cases trouvées : " + genRook(4*8 + 0).length + " (FAUX : wrap-around + saut de pièces)");
print("Réécris genRook proprement : décompose l'index en ligne et colonne, vérifie chaque borne, et stoppe-toi sur une pièce.");`,
      task:"Réécris genRook avec r=idx>>3, f=idx&7, bornes sur r ET f, et break sur une pièce.",
      hint:"var r = idx>>3, f = idx&7; … while (rr>=0 && rr<8 && ff>=0 && ff<8){ … else { if (adverse) out.push(ti); break; } rr+=dr; ff+=df; }",
      solution:`clear();
var b = new Array(64).fill(".");
function set(r, f, v){ b[r*8 + f] = v; }
set(4,0,"R"); set(4,6,"r");
var ROOK = [[-1,0],[1,0],[0,-1],[0,1]];
function genRook(idx){
  var r = idx >> 3, f = idx & 7, out = [];
  for (var k = 0; k < ROOK.length; k++){
    var dr = ROOK[k][0], df = ROOK[k][1], rr = r + dr, ff = f + df;
    while (rr >= 0 && rr < 8 && ff >= 0 && ff < 8){
      var ti = rr*8 + ff, p = b[ti];
      if (p === ".") out.push(ti);
      else { if (p === p.toLowerCase()) out.push(ti); break; }
      rr += dr; ff += df;
    }
  }
  return out;
}
print("Cases trouvées : " + genRook(4*8 + 0).length + " (correct : pas de wrap-around, stop sur pièce)");`,

  { id:"j5", title:"Le duel partagé : matchmaking + serveur qui recalcule", xp:25,
    concept:"File d'attente UNIQUE indexée par jeu (duelWaiting[jeu]) ; le serveur ne fait PAS confiance au client : il RECALCULE l'Indice.",
    coding:{ mode:"code",
      intro:"Le multijoueur d'AwemA en 2 idées : appairer 2 joueurs sur la même file, et faire RECALCULER le score par le serveur (jamais le client).",
      teach:`<p><b>1) Matchmaking</b> : une file <span class="k">indexée par jeu</span> <code>duelWaiting[jeu]</code> (un seul objet, pas une variable par jeu) : si quelqu'un attend, on appaire ; sinon on s'inscrit.</p>
        <p><b>2) Anti-triche</b> : le serveur IGNORE l'indice envoyé et le <span class="k">recalcule</span> : <code>Σ round(min(1, score/cible) × 1000)</code>, chaque score plafonné.</p>
        <p>👉 Complète <code>computeIndice</code> pour qu'un indice client « 999999 » soit ignoré (résultat attendu : 2000).</p>`,
      prompt:`Matchmaking 1v1 multi-jeux : un objet duelWaiting indexé par clé de jeu (appaire si un joueur attend, sinon inscrit). Puis computeIndice(games) = Σ round(min(1, score/cible)*1000) qui ignore l'indice du client et plafonne chaque maîtrise à 1.`,
      starter:`clear();
// 1) FILE D'ATTENTE indexée par jeu (UN objet, pas une variable par jeu)
var duelWaiting = { chess: null, awale: null };
function join(jeu, joueur){
  if (duelWaiting[jeu] && duelWaiting[jeu] !== joueur){
    print("DUEL " + jeu + " : " + duelWaiting[jeu] + " vs " + joueur);
    duelWaiting[jeu] = null;
  } else { duelWaiting[jeu] = joueur; print(joueur + " attend un adversaire (" + jeu + ")"); }
}
join("chess", "Awa"); join("awale", "Kofi"); join("chess", "Zoé");   // chess s'apparie, awale attend seul

// 2) Le SERVEUR recalcule l'Indice : il IGNORE l'indice envoyé par le client
var TARGETS = { echecs: 8, oware: 8, voraces: 400 };
function computeIndice(games){
  var t = 0;
  for (var k in TARGETS){ t += 0; }   // 👉 à toi : t += Math.round(Math.min(1, (games[k]||0) / TARGETS[k]) * 1000) — le serveur boucle sur SES cibles
  return t;
}
var triche = { indice: 999999, games: { echecs: 8, voraces: 1000000 } };
print("indice CLIENT prétendu : " + triche.indice);
print("indice SERVEUR recalculé : " + computeIndice(triche.games));`,

      hint:"Dans la boucle sur TARGETS : t += Math.round(Math.min(1, (games[k]||0) / TARGETS[k]) * 1000);",

join("chess", "Awa"); join("awale", "Kofi"); join("chess", "Zoé");
var TARGETS = { echecs: 8, oware: 8, voraces: 400 };
function computeIndice(games){
  var t = 0;

}
var triche = { indice: 999999, games: { echecs: 8, voraces: 1000000 } };
print("indice CLIENT prétendu : " + triche.indice);
print("indice SERVEUR recalculé : " + computeIndice(triche.games));`,

      intro:"Pièges IA documentés : une file par jeu (ne tient pas l'échelle) et — surtout — FAIRE CONFIANCE au score envoyé par le client.",
      teach:`<p>L'IA a écrit une variable de file par jeu (<code>waitingChess</code>, <code>waitingAwale</code>…) et, pire, <code>submitScore</code> renvoie directement <code>p.indice</code> : un tricheur impose 999999.</p>
        <p>👉 Réécris : un seul <code>duelWaiting[jeu]</code>, et un serveur qui <span class="k">recalcule</span> l'indice (ignore celui du client, plafonne chaque score).</p>`,
      missionType:"Repérer la faille de confiance + la file non indexée",
      examplePrompt:`Matchmaking 1v1 multi-jeux : UN seul objet duelWaiting indexé par clé (jamais une variable par jeu). Pour le classement, le serveur IGNORE l'indice envoyé et le RECALCULE = Σ round(min(1, score/cible)*1000), chaque score plafonné. Prouve qu'un indice gonflé (999999) n'a aucun effet.`,

/* ----------------------------- état & sauvegarde -------------------------- */
const LKEY = "awema_atelier_v1";
let prog = load();
function load(){ try { const p = JSON.parse(localStorage.getItem(LKEY)) || {}; return { done:p.done||[], xp:p.xp||0, track:(p.track==="vibe"?"vibe":"code"), tdone:p.tdone||{} }; } catch(e){ return { done:[], xp:0, track:"code", tdone:{} }; } }
function save(){ try { localStorage.setItem(LKEY, JSON.stringify(prog)); } catch(e){} }
const allLessons = COURSE.flatMap(m => m.lessons);
let current = allLessons.find(l => !prog.done.includes(l.id)) || allLessons[0];
function viewOf(l){ return (prog.track==="vibe" ? l.vibecoding : l.coding) || l.coding; }

/* ----------------------------- bac à sable -------------------------------- */
function fmt(v){ if (typeof v === "object" && v !== null) { try { return JSON.stringify(v); } catch(e){ return String(v); } } return String(v); }
function makePlayground(canvas, consoleEl){
  const api = { logs:[], calls:new Set(), error:null, src:"", W:canvas.width, H:canvas.height, ctx:canvas.getContext("2d") };
  api.pix = (x,y)=>{ try { return api.ctx.getImageData(x,y,1,1).data; } catch(e){ return [0,0,0,0]; } };
  let rafId=null, keyH=null, clickH=null;
  function stop(){ if (rafId) cancelAnimationFrame(rafId); rafId=null; if (keyH){ window.removeEventListener("keydown", keyH); keyH=null; } if (clickH){ canvas.removeEventListener("click", clickH); clickH=null; } }
  function render(){ consoleEl.textContent = (api.error ? "⛔ " + api.error + "\n" : "") + api.logs.join("\n"); }
  function run(src){
    stop(); api.logs=[]; api.calls=new Set(); api.error=null; api.src=src;
    api.ctx.clearRect(0,0,api.W,api.H);
    const print=(...a)=>{ api.calls.add("print"); api.logs.push(a.map(fmt).join(" ")); };
    const clear=()=>{ api.calls.add("clear"); api.ctx.clearRect(0,0,api.W,api.H); };
    const rand=(a=1,b)=>{ api.calls.add("rand"); if (b===undefined){ b=a; a=0; } return a + Math.random()*(b-a); };
    const loop=(fn)=>{ api.calls.add("loop"); let last=performance.now(); const step=(t)=>{ const dt=Math.min(0.05,(t-last)/1000); last=t; try { fn(dt); } catch(e){ api.error=e.message; render(); return; } rafId=requestAnimationFrame(step); }; rafId=requestAnimationFrame(step); };
    const onKey=(fn)=>{ api.calls.add("onKey"); keyH=e=>{ try { fn(e.key); } catch(err){} }; window.addEventListener("keydown", keyH); };
    const onClick=(fn)=>{ api.calls.add("onClick"); clickH=e=>{ const r=canvas.getBoundingClientRect(); try { fn((e.clientX-r.left)*api.W/r.width,(e.clientY-r.top)*api.H/r.height); } catch(err){} }; canvas.addEventListener("click", clickH); };
    try { const f=new Function("print","clear","rand","loop","onKey","onClick","ctx","W","H", src); f(print,clear,rand,loop,onKey,onClick,api.ctx,api.W,api.H); }
    catch(e){ api.error=e.message; }
    render();
    return api;
  }
  return { run, stop, api };
}

function renderTOC(){
  const toc = document.getElementById("toc"); toc.innerHTML = "";
  for (const m of COURSE){
    if (!m.lessons.length) continue;
    const md = document.createElement("div"); md.className="mod";
    md.innerHTML = `<h3>${m.icon} ${m.title}</h3>`;
    for (const l of m.lessons){
      const done = prog.done.includes(l.id);
      const a = document.createElement("button");
      a.type = "button";
      a.className = "lk" + (l===current ? " active" : "");
      if (l===current) a.setAttribute("aria-current", "true");
      a.setAttribute("aria-label", l.title + " — " + (done ? "terminé" : "à faire"));
      a.innerHTML = `<span class="st" aria-hidden="true">${done ? "✅" : "○"}</span><span>${l.title}</span>`;
      a.onclick = ()=>{ current=l; hintShown=false; renderAll(); document.getElementById("side").classList.remove("open"); };
      md.appendChild(a);
    }
    toc.appendChild(md);
  }
}
function refreshHeader(){
  document.getElementById("xp").textContent = prog.xp;
  const pct = Math.round(prog.done.length / allLessons.length * 100);
  document.getElementById("progChip").textContent = pct + " %";
  document.getElementById("progBar").style.width = pct + "%";
  const tc = document.getElementById("trackChip");
  tc.textContent = prog.track==="vibe" ? "🪄 Vibecoding" : "🧑‍💻 Coding";
  tc.className = "chip " + (prog.track==="vibe" ? "vibe" : "code");
  const b = [];
  for (const m of COURSE) if (m.lessons.length && m.lessons.every(l => prog.done.includes(l.id))) b.push(m.icon);
  document.getElementById("badges").textContent = b.join(" ");
}

function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function setBanner(txt, good){ const b=document.getElementById("banner"); b.textContent=txt; b.className="banner show " + (good?"good":"bad"); }
function setMentor(txt){ const m=document.getElementById("mentorTxt"); if (m) m.textContent=txt; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function setTrack(t){ const want = (t==="vibe"?"vibe":"code"); if (want===prog.track) return; prog.track=want; save(); hintShown=false; if (pg) pg.stop(); renderAll(); window.scrollTo(0,0); const tb=document.getElementById(want==="vibe"?"tab-vibe":"tab-code"); if (tb) tb.focus({preventScroll:true}); setMentor(want==="vibe" ? "Mode 🪄 Vibecoding : tu diriges l'IA et tu VÉRIFIES son code. Se tromper en pilotant est normal, c'est comme ça qu'on apprend !" : "Mode 🧑‍💻 Coding : tu écris le code toi-même, ligne à ligne. À toi de jouer !"); }

function award(l){ if (!prog.done.includes(l.id)){ prog.done.push(l.id); prog.xp += l.xp; } prog.tdone[l.id]=prog.tdone[l.id]||{}; prog.tdone[l.id][prog.track==="vibe"?"vibe":"code"]=true; save(); refreshHeader(); renderTOC(); }

function runPlay(){
  const src = document.getElementById("editor").value;
  pg.run(src);
  const l = current, v = viewOf(l);
  if (v.check){
    let ok=false; try { ok = !!v.check(pg.api); } catch(e){ ok=false; }
    if (pg.api.error) { setMentor("Il y a une erreur — regarde la console (en rouge), souvent une parenthèse ou un point-virgule."); setBanner("⛔ " + pg.api.error, false); return; }
    if (ok){ const first=!prog.done.includes(l.id); award(l); setMentor(pick(PRAISE));
      const other = prog.track==="vibe" ? "code":"vibe";
      const extra = !(prog.tdone[l.id] && prog.tdone[l.id][other]) ? " Tu peux retenter en " + (other==="vibe"?"🪄 Vibecoding":"🧑‍💻 Coding") + "." : "";
      const isLast = allLessons.indexOf(l) === allLessons.length-1;
      setBanner("✅ Validé ! " + (first?"+"+l.xp+" XP. ":"") + (isLast ? "🎉 Tu as terminé l'Atelier !" : "Clique « Suivant → ».") + extra, true); }
    else { setMentor(hintShown ? v.hint : pick(ENCOURAGE)); setBanner("Pas encore validé. " + (hintShown ? "Indice : " + v.hint : "Clique 💡 Indice."), false); }
  } else {
    if (pg.api.error){ setBanner("⛔ " + pg.api.error, false); return; }
    award(l); setMentor("Bien vu ! Tu peux modifier le code et relancer pour expérimenter.");
    setBanner("👍 Démo lancée. Tu peux passer à la suite quand tu veux.", true);
  }
}

function resetCode(){ document.getElementById("editor").value = viewOf(current).starter || ""; pg.stop(); document.getElementById("console").textContent="▶ Lance ton code…"; pg.api.ctx.clearRect(0,0,pg.api.W,pg.api.H); }
function showHint(){ hintShown=true; const v=viewOf(current); setMentor("💡 " + (v.hint || "Relis bien l'énoncé, étape par étape.")); setBanner("💡 " + (v.hint||""), true); }
function showSolution(){ const v=viewOf(current); if (v.solution){ document.getElementById("editor").value = v.solution; setMentor("Voici une solution. Lis-la, lance-la, puis essaie de la réécrire toi-même !"); } }
function copyPrompt(){ const v=viewOf(current); const t=(prog.track==="vibe"?v.examplePrompt:v.prompt)||""; if (navigator.clipboard) navigator.clipboard.writeText(t).then(()=>setMentor("📋 Prompt copié ! Colle-le à une IA (comme Claude) pour t'entraîner.")); else setMentor("Sélectionne le texte du prompt et copie-le (Ctrl+C)."); }
function go(d){ if (pg) pg.stop(); const i=allLessons.indexOf(current)+d; if (i<0) return; if (i>=allLessons.length){ setMentor("🎉 Bravo, tu as terminé l'Atelier ! Tu sais désormais créer un jeu AwemA — le griot racontera tes exploits 🥁."); setBanner("🎉 Atelier terminé ! Tu sais créer un jeu AwemA. Tu peux retenter chaque leçon dans l'autre piste.", true); return; } current=allLessons[i]; hintShown=false; renderAll(); window.scrollTo(0,0); }
function toggleSide(){ const open=document.getElementById("side").classList.toggle("open"); const b=document.querySelector(".menuBtn"); if (b){ b.setAttribute("aria-expanded", open?"true":"false"); b.setAttribute("aria-label", open?"Fermer le menu des leçons":"Ouvrir le menu des leçons"); } }

// Tab insère 2 espaces dans l'éditeur
document.addEventListener("keydown", e=>{
  if (e.key==="Tab" && e.target && e.target.id==="editor"){ e.preventDefault(); const t=e.target, s=t.selectionStart, en=t.selectionEnd; t.value=t.value.slice(0,s)+"  "+t.value.slice(en); t.selectionStart=t.selectionEnd=s+2; }
  // Flèches ←/→ entre onglets de piste quand le focus est sur un onglet
  if ((e.key==="ArrowLeft"||e.key==="ArrowRight") && e.target && e.target.getAttribute && e.target.getAttribute("role")==="tab"){ e.preventDefault(); const want = e.key==="ArrowRight" ? "vibe" : "code"; setTrack(want); const nx=document.getElementById(want==="vibe"?"tab-vibe":"tab-code"); if (nx) nx.focus(); }
});

renderAll();
</script>
</body>
</html>
