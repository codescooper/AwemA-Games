<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Le Miroir — le cinéma du village</title>
<style>
  :root { color-scheme: dark; --gold:#f0c64a; --vio:#7c5cff; }
  * { box-sizing: border-box; }
  body { font-family:system-ui,-apple-system,sans-serif; margin:0; min-height:100vh; color:#f3ece0;
    background: radial-gradient(1100px 600px at 50% -8%, #1a2436, #0a0d14 64%); display:flex; flex-direction:column; align-items:center; padding:1rem .7rem 3rem; }
  a { color:#bcd6ff; }
  .top { width:100%; max-width:860px; display:flex; align-items:center; gap:.6rem; flex-wrap:wrap; }
  .top h1 { font-size:clamp(1.3rem,4.5vw,1.9rem); margin:.2rem 0; }
  .top .sp { flex:1; }
  .tbtn { font:inherit; color:#fff; background:#ffffff14; border:1px solid #ffffff2e; border-radius:.5rem; padding:.35rem .6rem; cursor:pointer; text-decoration:none; font-size:.85rem; }
  .tbtn:hover { background:#ffffff24; }
  .wrap { width:100%; max-width:860px; display:flex; flex-direction:column; gap:.9rem; margin-top:.7rem; }
  /* le miroir / écran */
  .mirror { border-radius:1rem; padding:10px; background:linear-gradient(135deg,#cfe0ff33,#7c5cff22); border:2px solid #ffffff33; box-shadow:0 0 40px #7c5cff33, inset 0 0 30px #ffffff14; }
  .screen { position:relative; width:100%; aspect-ratio:16/9; background:#05070c; border-radius:.6rem; overflow:hidden; display:flex; align-items:center; justify-content:center; }
  .screen iframe { position:absolute; inset:0; width:100%; height:100%; border:0; }
  .screen .ph { text-align:center; opacity:.7; padding:1rem; }
  .now { display:flex; align-items:center; gap:.6rem; flex-wrap:wrap; margin-top:.5rem; font-size:.9rem; }
  .now .t { font-weight:700; }
  .tag { display:inline-block; font-size:.74rem; background:#ffffff14; border:1px solid #ffffff2e; border-radius:1rem; padding:.05rem .5rem; }
  .tag.by { color:#8fe0d4; }
  .live { color:#ff6b6b; font-weight:800; }
  .card { background:#ffffff0c; border:1px solid #ffffff1c; border-radius:.9rem; padding:.85rem 1rem; }
  .card h2 { font-size:.95rem; margin:.1rem 0 .55rem; opacity:.85; }
  .form { display:flex; gap:.5rem; flex-wrap:wrap; }
  .form input { flex:1; min-width:160px; font:inherit; background:#0b0d16; color:#fff; border:1px solid #ffffff2e; border-radius:.55rem; padding:.55rem .7rem; }
  .form button { font:inherit; font-weight:800; background:var(--gold); color:#2a1c04; border:0; border-radius:.55rem; padding:.55rem 1rem; cursor:pointer; }
  .q { display:flex; align-items:center; gap:.6rem; padding:.45rem .2rem; border-bottom:1px solid #ffffff12; font-size:.9rem; }
  .q .n { width:1.6rem; opacity:.6; text-align:center; }
  .q .body { flex:1; min-width:0; } .q .body .t { font-weight:600; }
  .q .body .m { font-size:.76rem; opacity:.75; }
  .note { font-size:.8rem; opacity:.62; text-align:center; line-height:1.5; }
</style>
</head>
<body>
  <div class="top">
    <h1>🪞 Le Miroir</h1>
    <span class="sp"></span>
    <span class="tag"><span class="live">●</span> <span id="viewers">1</span> spectateurs</span>
    <a class="tbtn" href="monde.html">🗺️ Village</a>
    <a class="tbtn" href="index.html">≡ Menu</a>
  </div>

  <div class="wrap">
    <div class="mirror">
      <div class="screen" id="screen"></div>
      <div class="now" id="now"></div>
    </div>

    <div class="card">
      <h2>🎬 Proposer une vidéo (lien YouTube)</h2>
      <div class="form">
        <input id="url" placeholder="https://youtu.be/… ou https://youtube.com/watch?v=…" />
        <input id="vtitle" maxlength="50" placeholder="Titre (optionnel)" style="max-width:160px" />
        <button onclick="addVideo()">＋ Mettre en file</button>
      </div>
      <div style="margin-top:.4rem"><button class="tbtn" onclick="next()">⏭️ Vidéo suivante</button></div>
    </div>

    <div class="card">
      <h2>⏳ File d'attente (<span id="qcount">0</span>)</h2>
      <div id="queue"></div>
    </div>

    <div class="note" id="note"></div>
  </div>

<script>
/* ============================================================================
   LE MIROIR — cinéma du village : file de vidéos, une à la fois, taguée par
   son demandeur. 100% local (la file vit dans localStorage). La vidéo joue via
   un embed YouTube (couche en ligne). ─ Lecture VRAIMENT synchronisée entre
   joueurs (même seconde pour tous) = avec le serveur ; ici, file + lecteur local. ─
   ========================================================================== */
addEventListener("error", ev=>{ try{ let d=document.getElementById("errband");
  if(!d){ d=document.createElement("div"); d.id="errband"; d._n=0;
    d.style.cssText="position:fixed;left:8px;top:8px;right:8px;z-index:99;background:#5a1410;color:#ffd9d0;border:1px solid #ff6b6b;border-radius:8px;padding:8px 10px;font:13px/1.4 system-ui;white-space:pre-wrap";
    document.body.appendChild(d);} d._n++; d.textContent="⛔ "+(ev.message||"erreur"); }catch(e){} });

const lsGet=k=>{ try{ return localStorage.getItem(k); }catch(e){ return null; } };
const lsSet=(k,v)=>{ try{ localStorage.setItem(k,v); }catch(e){} };
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const myName=()=> lsGet("awema_player") || "Toi";

const KEY="awema_cinema_v1";
const SEED=[
  { id:"s1", title:"Danse du Zaouli (proposée à l'ouverture)", vid:null, by:"Awa la griotte" },
  { id:"s2", title:"Mix coupé-décalé", vid:null, by:"Kouamé" },
];
let queue=load();
function load(){ try{ const q=JSON.parse(lsGet(KEY)); if(Array.isArray(q)) return q; }catch(e){} lsSet(KEY,JSON.stringify(SEED)); return SEED.slice(); }
function save(){ lsSet(KEY,JSON.stringify(queue)); }

function ytId(url){ const m=String(url).match(/(?:youtu\.be\/|[?&]v=|embed\/|shorts\/)([\w-]{11})/); return m?m[1]:(/^[\w-]{11}$/.test(url)?url:null); }
function addVideo(){
  const url=document.getElementById("url").value.trim(); const id=ytId(url);
  if(!id){ document.getElementById("note").textContent="⚠ Lien YouTube non reconnu (colle une URL youtu.be/… ou youtube.com/watch?v=…)."; return; }
  const title=document.getElementById("vtitle").value.trim() || "Vidéo de "+myName();
  queue.push({ id:"v"+Date.now(), title:title.slice(0,50), vid:id, by:myName() });
  document.getElementById("url").value=""; document.getElementById("vtitle").value="";
  document.getElementById("note").textContent="";
  save(); render();
}
function next(){ if(queue.length){ queue.shift(); save(); render(); } }

function render(){
  const cur=queue[0];
  const sc=document.getElementById("screen");
  if(cur && cur.vid){ sc.innerHTML=`<iframe src="https://www.youtube-nocookie.com/embed/${cur.vid}?autoplay=1&rel=0&modestbranding=1" allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>`; }
  else sc.innerHTML=`<div class="ph">🪞<br>${cur?("« "+esc(cur.title)+" » — pas de lecteur (demande sans lien).<br>Propose un lien YouTube pour lancer la projection."):"Le miroir est éteint. Propose la première vidéo !"}</div>`;
  document.getElementById("now").innerHTML = cur
    ? `<span>À l'affiche :</span><span class="t">${esc(cur.title)}</span><span class="tag by">🙋 demandée par ${esc(cur.by)}</span>`
    : `<span style="opacity:.7">Rien à l'affiche.</span>`;
  const rest=queue.slice(1);
  document.getElementById("qcount").textContent=rest.length;
  document.getElementById("queue").innerHTML = rest.length
    ? rest.map((v,i)=>`<div class="q"><span class="n">${i+1}</span><div class="body"><div class="t">${esc(v.title)}</div><div class="m">🙋 ${esc(v.by)} ${v.vid?"":"· (sans lien)"}</div></div></div>`).join("")
    : `<div style="opacity:.6;font-size:.88rem">File vide — propose la prochaine vidéo, tout le monde la regardera à son tour.</div>`;
  if(!document.getElementById("note").innerHTML)
    document.getElementById("note").innerHTML=`Une vidéo à la fois, dans l'ordre de la file — chacun voit qui l'a demandée. <span class="tag">prototype local</span> La lecture synchronisée à la seconde près entre tous les joueurs viendra avec le serveur.`;
}

/* spectateurs simulés */
let viewers=3+Math.floor(Math.random()*8);
function tickViewers(){ viewers=Math.max(1, viewers+(Math.random()<0.5?-1:1)); document.getElementById("viewers").textContent=viewers; }
setInterval(tickViewers, 3500); tickViewers();
render();
</script>
</body>
</html>
