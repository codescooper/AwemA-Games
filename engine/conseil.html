<script>
/* ===== MOTEUR (logique identique ; ajout ADDITIF d'un tableau `events`) ===== */
const CONFIG = { START:{gold:100,grain:100,soldiers:50}, INCOME:{city:{gold:20,grain:0},oasis:{gold:0,grain:20},port:{gold:15,grain:10}}, DEV_COST:40, DEV_INCOME_BONUS:5, CARAVANE_PROFIT_RATE:0.5, FORTIFIE_COST:40, FORTIFY_DEF_MULT:0.4, COMBAT:{winnerLossRate:0.6,loserLossRate:0.85}, MUTUAL_DEFENSE_REINFORCE_RATE:0.3, UPKEEP_RATE:0.34, TERRAIN_DEF:{city:1.6,port:1.2,oasis:0.95}, TREATY_BREAK_REP_PENALTY:10, PRESTIGE:{perHoldingPerTick:2,tradeProfitDivisor:12,defenseWon:10,capture:8,repHigh:4,repLow:2,treatyPerTick:1}, REP:{start:50,min:0,max:100}, SEASON_LENGTH:24 };
const clampRep = h => { h.reputation = Math.max(CONFIG.REP.min, Math.min(CONFIG.REP.max, h.reputation)); };
function neighbors(s, id){ const o=[]; for(const [a,b] of s.edges){ if(a===id)o.push(b); else if(b===id)o.push(a);} return o.sort(); }
function shortestPath(s, from, to){ if(from===to)return[from]; const q=[from],prev={[from]:null}; while(q.length){const c=q.shift(); for(const n of neighbors(s,c)){ if(!(n in prev)){prev[n]=c; if(n===to){const p=[n];let x=c;while(x!=null){p.unshift(x);x=prev[x];}return p;} q.push(n);}}} return null; }
const hasActiveTreaty=(s,a,b)=>s.treaties.some(t=>t.status==="active"&&((t.a===a&&t.b===b)||(t.a===b&&t.b===a)));
const isMutualDefense=(s,a,b)=>s.treaties.some(t=>t.status==="active"&&t.type==="mutual_defense"&&((t.a===a&&t.b===b)||(t.a===b&&t.b===a)));
const holdingsOf=(s,id)=>Object.values(s.holdings).filter(h=>h.ownerHouseId===id).sort((x,y)=>x.id<y.id?-1:1);
const totalSoldiers=(s,id)=>holdingsOf(s,id).reduce((n,h)=>n+h.soldiers,0);
function removeSoldiers(s,id,n){ const hs=holdingsOf(s,id).sort((a,b)=>b.soldiers-a.soldiers); let left=n; for(const h of hs){ const t=Math.min(h.soldiers,left); h.soldiers-=t; left-=t; if(left<=0)break; } }
const EVENTS={
  harmattan:{name:"L'Harmattan (sécheresse)",apply:(h,c,s)=>{if(c==="partager"){h.reputation+=10;h.grain-=30;}else if(c==="speculer"){h.gold+=40;h.reputation-=15;}clampRep(h);},aggregate:(s,ch,log)=>{const v=Object.values(ch),hoard=v.filter(c=>c==="thesauriser").length;if(hoard*2>v.length){for(const h of Object.values(s.houses))h.grain-=10;log.push({tick:s.tick,text:"La majorité a thésaurisé : la famine s'aggrave (−10 grain pour tous).",public:true});}}},
  foire:{name:"Grande Foire de Tombouctou",apply:(h,c,s)=>{if(c==="investir")h.gold+=50;else if(c==="parader"){h.gold-=40;h.prestige+=15;}else if(c==="mercenaires"){h.gold-=60;s.holdings[h.capitalHoldingId].soldiers+=20;}}},
  pelerins:{name:"La caravane de pèlerins",apply:(h,c,s)=>{if(c==="escorter")h.reputation+=10;else if(c==="taxer"){h.gold+=30;h.reputation-=5;}clampRep(h);}},
  crue:{name:"La crue du fleuve",apply:(h,c,s)=>{if(c==="semer"){h.gold-=20;h.grain+=30;}else if(c==="prier")h.reputation+=5;clampRep(h);}},
  griot:{name:"Le griot chante ta lignée",apply:(h,c,s)=>{if(c==="honorer"){h.gold-=15;h.prestige+=12;}else if(c==="modeste")h.reputation+=3;clampRep(h);}},
  pillards:{name:"Des pillards rôdent",apply:(h,c,s)=>{if(c==="tribut")h.gold-=30;else if(c==="garde"){h.gold-=10;s.holdings[h.capitalHoldingId].soldiers+=10;}clampRep(h);}}
};
/* ===== ARC DE SAISON (3 actes) + AMBITIONS (voies de victoire) ===== */
const ACTS=[{from:16,name:"Le Sacre",mult:1.5,ic:"👑"},{from:8,name:"Les Tensions",mult:1,ic:"⚔️"},{from:0,name:"L'Essor",mult:1,ic:"🌱"}];
function actOf(tick){ for(const a of ACTS)if(tick>=a.from)return a; return ACTS[ACTS.length-1]; }
const AMBITIONS={
  commerce:{name:"Empire marchand",desc:"finir avec ≥ 350 or",check:(s,h)=>h.gold>=350,bonus:50},
  conquete:{name:"Soif de conquête",desc:"tenir ≥ 5 lieux",check:(s,h)=>holdingsOf(s,h.id).length>=5,bonus:50},
  diplomatie:{name:"Tisseur d'alliances",desc:"≥ 3 traités actifs",check:(s,h)=>s.treaties.filter(t=>t.status==="active"&&(t.a===h.id||t.b===h.id)).length>=3,bonus:50},
  bastion:{name:"Cœur imprenable",desc:"≥ 4 fortifications cumulées",check:(s,h)=>holdingsOf(s,h.id).reduce((n,x)=>n+x.fortification,0)>=4,bonus:50},
  renommee:{name:"Gloire éternelle",desc:"réputation ≥ 75",check:(s,h)=>h.reputation>=75,bonus:50}
};
function isOrderValid(s,o){ const h=s.houses[o.houseId]; if(!h||!h.alive)return false; const p=o.params||{}; switch(o.type){
  case"DEV":return !!s.holdings[p.holding]&&s.holdings[p.holding].ownerHouseId===h.id&&h.gold>=CONFIG.DEV_COST;
  case"FORTIFIE":return !!s.holdings[p.holding]&&s.holdings[p.holding].ownerHouseId===h.id&&h.gold>=CONFIG.FORTIFIE_COST;
  case"LEVEE":return p.count>0&&h.grain>=p.count&&h.gold>=p.count;
  case"CARAVANE":return p.gold>0&&h.gold>=p.gold&&!!s.holdings[p.from]&&s.holdings[p.from].ownerHouseId===h.id&&!!s.holdings[p.to];
  case"MARCHE":{const f=s.holdings[p.from];return !!f&&f.ownerHouseId===h.id&&p.soldiers>0&&f.soldiers>=p.soldiers&&neighbors(s,p.from).includes(p.to);}
  case"EMISSAIRE":return !!s.houses[p.target]&&p.target!==h.id; default:return false; } }
function resolveTick(input0, tickInput){ const state=structuredClone(input0); const log=[]; const events=[]; const econ={}; const ec=id=>econ[id]||(econ[id]={incomeGold:0,incomeGrain:0,upkeep:0,desertions:0}); const acc={tradeProfit:{},defensesWon:{},captures:{}};
  const orders=[...tickInput.orders]; const choices={...tickInput.eventChoices}; generateAIOrders(state,orders,choices,tickInput.eventId);
  const valid=orders.filter(o=>{const ok=isOrderValid(state,o);o.status=ok?"pending":"invalid";return ok;});
  for(const hd of Object.values(state.holdings)){ if(!hd.ownerHouseId)continue; const o=state.houses[hd.ownerHouseId]; if(!o)continue; const inc=CONFIG.INCOME[hd.type]; const ig=inc.gold+(hd.type!=="oasis"?hd.incomeBonus:0), igr=inc.grain+(hd.type==="oasis"?hd.incomeBonus:0); o.gold+=ig; o.grain+=igr; const e=ec(o.id); e.incomeGold+=ig; e.incomeGrain+=igr; }
  const ev=EVENTS[tickInput.eventId];
  if(ev){ for(const h of Object.values(state.houses)){const c=choices[h.id];if(c)ev.apply(h,c,state);} if(ev.aggregate)ev.aggregate(state,choices,log); }
  for(const o of valid.filter(o=>o.type==="CARAVANE")){ const h=state.houses[o.houseId]; const path=shortestPath(state,o.params.from,o.params.to); if(h.gold<o.params.gold){o.status="invalid";continue;} h.gold-=o.params.gold; let interceptor=null;
    if(path)for(const hid of path.slice(1)){const hd=state.holdings[hid];if(hd.ownerHouseId&&hd.ownerHouseId!==h.id&&!hasActiveTreaty(state,h.id,hd.ownerHouseId)&&hd.soldiers>0){interceptor=hd.ownerHouseId;break;}}
    events.push({type:"caravan",from:o.params.from,to:o.params.to,house:h.id,intercepted:!!interceptor});
    if(interceptor){state.houses[interceptor].gold+=o.params.gold;log.push({tick:state.tick,text:`Caravane de ${h.name} interceptée par ${state.houses[interceptor].name} (−${o.params.gold} or).`,houseId:h.id,public:false});}
    else{const profit=Math.floor(o.params.gold*CONFIG.CARAVANE_PROFIT_RATE);h.gold+=o.params.gold+profit;acc.tradeProfit[h.id]=(acc.tradeProfit[h.id]||0)+profit;log.push({tick:state.tick,text:`Caravane de ${h.name} arrivée (+${profit} or de profit).`,houseId:h.id,public:false});} }
  const marches=valid.filter(o=>o.type==="MARCHE");
  for(const o of marches){const f=state.holdings[o.params.from];const n=Math.min(o.params.soldiers,f.soldiers);o.params.soldiers=n;f.soldiers-=n;}
  const byTarget={}; for(const o of marches)(byTarget[o.params.to]||(byTarget[o.params.to]=[])).push(o);
  for(const target of Object.keys(byTarget).sort()){ const hd=state.holdings[target]; const attackers=byTarget[target]; const attackTotal=attackers.reduce((n,o)=>n+o.params.soldiers,0); const defenderId=hd.ownerHouseId; let captured=false, capturedBy=null;
    const reinforcements=[]; if(defenderId)for(const ah of Object.values(state.holdings)){if(ah.ownerHouseId&&ah.ownerHouseId!==defenderId&&isMutualDefense(state,defenderId,ah.ownerHouseId)&&neighbors(state,target).includes(ah.id)){const amt=Math.floor(ah.soldiers*CONFIG.MUTUAL_DEFENSE_REINFORCE_RATE);if(amt>0)reinforcements.push({hid:ah.id,amount:amt});}}
    const reinforceTotal=reinforcements.reduce((n,r)=>n+r.amount,0); const terr=CONFIG.TERRAIN_DEF[hd.type]||1; const defensePower=Math.floor(hd.soldiers*terr*(1+CONFIG.FORTIFY_DEF_MULT*hd.fortification))+reinforceTotal;
    if(attackTotal>defensePower){ hd.soldiers=0; for(const r of reinforcements)state.holdings[r.hid].soldiers-=Math.floor(r.amount*CONFIG.COMBAT.loserLossRate);
      const biggest=[...attackers].sort((a,b)=>b.params.soldiers-a.params.soldiers||(a.houseId<b.houseId?-1:1))[0];
      for(const o of attackers){const surv=o.params.soldiers-Math.floor(o.params.soldiers*CONFIG.COMBAT.winnerLossRate); if(o===biggest){hd.ownerHouseId=o.houseId;hd.fortification=0;hd.soldiers=surv;acc.captures[o.houseId]=(acc.captures[o.houseId]||0)+1;captured=true;capturedBy=o.houseId;log.push({tick:state.tick,text:`${state.houses[o.houseId].name} a capturé ${hd.name} !`,public:true});}else state.holdings[o.params.from].soldiers+=surv;}
      if(defenderId)log.push({tick:state.tick,text:`${hd.name} (${state.houses[defenderId].name}) est TOMBÉ — garnison dispersée.`,houseId:defenderId,public:false});
    } else { for(const o of attackers){const surv=o.params.soldiers-Math.floor(o.params.soldiers*CONFIG.COMBAT.loserLossRate);state.holdings[o.params.from].soldiers+=surv;} const defLoss=Math.floor(hd.soldiers*CONFIG.COMBAT.winnerLossRate); hd.soldiers-=defLoss; for(const r of reinforcements)state.holdings[r.hid].soldiers-=Math.floor(r.amount*CONFIG.COMBAT.winnerLossRate); if(defenderId){acc.defensesWon[defenderId]=(acc.defensesWon[defenderId]||0)+1;log.push({tick:state.tick,text:`${hd.name} (${state.houses[defenderId].name}) a repoussé l'assaut.`,houseId:defenderId,public:true});} }
    events.push({type:"attack",to:target,sources:attackers.map(o=>o.params.from),win:attackTotal>defensePower,captured,by:capturedBy}); }
  for(const o of valid.filter(o=>["DEV","LEVEE","FORTIFIE"].includes(o.type))){ const h=state.houses[o.houseId]; const p=o.params;
    if(o.type==="DEV"&&h.gold>=CONFIG.DEV_COST){h.gold-=CONFIG.DEV_COST;state.holdings[p.holding].incomeBonus+=CONFIG.DEV_INCOME_BONUS;}
    else if(o.type==="FORTIFIE"&&h.gold>=CONFIG.FORTIFIE_COST){h.gold-=CONFIG.FORTIFIE_COST;state.holdings[p.holding].fortification+=1;}
    else if(o.type==="LEVEE"&&h.grain>=p.count&&h.gold>=p.count){h.grain-=p.count;h.gold-=p.count;state.holdings[h.capitalHoldingId].soldiers+=p.count;} }
  for(const o of valid.filter(o=>o.type==="EMISSAIRE")){ const h=state.houses[o.houseId]; const p=o.params;
    if(p.action==="propose"){if(!state.treaties.some(t=>t.status!=="broken"&&t.type===p.treaty&&((t.a===h.id&&t.b===p.target)||(t.a===p.target&&t.b===h.id))))state.treaties.push({a:h.id,b:p.target,type:p.treaty,status:"proposed",proposedBy:h.id});}
    else if(p.action==="accept"){const t=state.treaties.find(t=>t.status==="proposed"&&((t.a===p.target&&t.b===h.id)||(t.a===h.id&&t.b===p.target)));if(t){t.status="active";log.push({tick:state.tick,text:`Traité ${t.type} actif entre ${state.houses[t.a].name} et ${state.houses[t.b].name}.`,public:true});}}
    else if(p.action==="break"){const t=state.treaties.find(t=>t.status==="active"&&((t.a===h.id&&t.b===p.target)||(t.a===p.target&&t.b===h.id)));if(t){t.status="broken";h.reputation-=CONFIG.TREATY_BREAK_REP_PENALTY;clampRep(h);log.push({tick:state.tick,text:`${h.name} a ROMPU son traité avec ${state.houses[p.target].name} !`,public:true});}} }
  /* intendance : les guerriers consomment du grain ; famine -> désertion */
  for(const h of Object.values(state.houses)){ const sol=totalSoldiers(state,h.id); if(sol<=0)continue; const need=Math.ceil(sol*CONFIG.UPKEEP_RATE); const e=ec(h.id);
    if(h.grain>=need){ h.grain-=need; e.upkeep=need; }
    else { e.upkeep=h.grain; const unfed=need-h.grain; h.grain=0; const desert=Math.min(sol,Math.ceil(unfed/CONFIG.UPKEEP_RATE)); removeSoldiers(state,h.id,desert); e.desertions=desert; log.push({tick:state.tick,text:`Famine chez ${h.name} : ${desert} guerriers désertent (grain épuisé).`,houseId:h.id,public:false}); } }
  for(const h of Object.values(state.houses)){ const nb=holdingsOf(state,h.id).length; h.alive=nb>0; let d=nb*CONFIG.PRESTIGE.perHoldingPerTick+Math.floor((acc.tradeProfit[h.id]||0)/CONFIG.PRESTIGE.tradeProfitDivisor)+(acc.defensesWon[h.id]||0)*CONFIG.PRESTIGE.defenseWon+(acc.captures[h.id]||0)*CONFIG.PRESTIGE.capture+state.treaties.filter(t=>t.status==="active"&&(t.a===h.id||t.b===h.id)).length*(CONFIG.PRESTIGE.treatyPerTick||0); if(h.reputation>=70)d+=CONFIG.PRESTIGE.repHigh;else if(h.reputation<=30)d-=CONFIG.PRESTIGE.repLow; h.prestige+=Math.round(d*actOf(state.tick).mult); }
  state.tick+=1;
  if(state.tick>=CONFIG.SEASON_LENGTH){ for(const h of Object.values(state.houses)){ const amb=AMBITIONS[h.ambition]; if(amb&&!h.ambitionDone&&amb.check(state,h)){ h.prestige+=amb.bonus; h.ambitionDone=true; log.push({tick:state.tick,text:`${h.name} accomplit son ambition — « ${amb.name} » (+${amb.bonus} 👑) !`,public:true}); } } }
  return {state,log,events,econ}; }
/* ===== IA VIVANTE : chaque Maison a une DOCTRINE et réagit au monde ===== */
const DOCTRINE={ tinduk:"conquerant", zalimba:"marchand", djenne:"diplomate", tombouctou:"batisseur", gao:"opportuniste" };
const DOCTRINE_NAME={ conquerant:"⚔️ Conquérant", marchand:"🐫 Marchand", diplomate:"🕊️ Diplomate", batisseur:"🏗️ Bâtisseur", opportuniste:"🎭 Opportuniste" };
const aiDoctrine=id=>DOCTRINE[id]||"batisseur";
const AI_EVENT_CHOICE={ harmattan:{conquerant:"speculer",marchand:"speculer",diplomate:"partager",batisseur:"thesauriser",opportuniste:"speculer"}, foire:{conquerant:"mercenaires",marchand:"investir",diplomate:"parader",batisseur:"investir",opportuniste:"investir"}, pelerins:{conquerant:"taxer",marchand:"taxer",diplomate:"escorter",batisseur:"escorter",opportuniste:"taxer"}, crue:{conquerant:"rien",marchand:"semer",diplomate:"prier",batisseur:"semer",opportuniste:"semer"}, griot:{conquerant:"honorer",marchand:"modeste",diplomate:"modeste",batisseur:"honorer",opportuniste:"honorer"}, pillards:{conquerant:"garde",marchand:"tribut",diplomate:"tribut",batisseur:"garde",opportuniste:"garde"} };
const defEst=(s,id)=>{ const hd=s.holdings[id]; return Math.floor(hd.soldiers*(CONFIG.TERRAIN_DEF[hd.type]||1)*(1+CONFIG.FORTIFY_DEF_MULT*hd.fortification)); };
function neighborHouses(s,id){ const set=new Set(); for(const hd of holdingsOf(s,id))for(const n of neighbors(s,hd.id)){ const o=s.holdings[n].ownerHouseId; if(o&&o!==id)set.add(o); } return [...set].sort(); }
function leaderId(s){ const arr=Object.values(s.houses).filter(h=>h.alive).sort((a,b)=>b.prestige-a.prestige||(a.id<b.id?-1:1)); return arr.length?arr[0].id:null; }
function enemyBorders(s,id){ const out=[]; for(const hd of holdingsOf(s,id))for(const n of neighbors(s,hd.id)){ const t=s.holdings[n]; if(t.ownerHouseId&&t.ownerHouseId!==id&&!hasActiveTreaty(s,id,t.ownerHouseId)) out.push({from:hd.id,to:n,owner:t.ownerHouseId,def:defEst(s,n)}); } return out; }
function generateAIOrders(state,orders,choices,eventId){
  const hasOrders=id=>orders.some(o=>o.houseId===id); const leader=leaderId(state);
  for(const h of Object.values(state.houses).sort((a,b)=>a.id<b.id?-1:1)){
    if(!h.isAI||!h.alive)continue; const doc=aiDoctrine(h.id);
    if(choices[h.id]===undefined){ const m=AI_EVENT_CHOICE[eventId]; if(m&&m[doc])choices[h.id]=m[doc]; }
    if(hasOrders(h.id))continue;

  const nodes=Object.values(state.holdings).map(h=>{ const [x,y]=POS[h.id]; const c=HOUSE_COLORS[h.ownerHouseId]||"#9a9a9a"; const mine=h.ownerHouseId===PLAYER; const sel=h.id===selectedHolding; const cs=cand?cand[h.id]:null; const isFrom=cand&&h.id===pendingFrom; const dim=(cand&&!cs&&!isFrom)?' opacity="0.35"':'';
    const candRing=cs?`<circle cx="${x}" cy="${y}" r="${r+6}" fill="none" stroke="${cs==='good'?'#1a7f37':'#cf222e'}" stroke-width="3"/>`:'';
    const candBadge=cs?`<text x="${x-r+1}" y="${y-r+11}" font-size="13">${cs==='good'?'✅':'⚠️'}</text>`:'';
    return `<g class="node" onclick="onNodeClick('${h.id}')"${dim}>${candRing}${sel?`<circle cx="${x}" cy="${y}" r="${r+7}" fill="none" stroke="#111" stroke-width="2" stroke-dasharray="3 3"/>`:""}${mine?`<circle cx="${x}" cy="${y}" r="${r+4}" fill="none" stroke="#c8941f" stroke-width="2"/>`:""}<circle cx="${x}" cy="${y}" r="${r}" fill="${c}26" stroke="${c}" stroke-width="${mine?4:2.5}"/><text x="${x}" y="${y-3}" text-anchor="middle" font-size="15">${TYPE_ICON[h.type]}</text><text x="${x}" y="${y+13}" text-anchor="middle" font-size="11" font-weight="bold" fill="${c}">⚔️${h.soldiers}</text>${h.fortification>0?`<text x="${x+r-6}" y="${y-r+10}" font-size="11">🛡️</text>`:""}${candBadge}<text x="${x}" y="${y+r+13}" text-anchor="middle" font-size="11" fill="#3a2e1f">${h.name}</text></g>`;
  }).join("");
  let overlay="";
  if(ev) for(const e of ev){ if(e.type==="attack"){ const [tx,ty]=POS[e.to]; for(const sf of e.sources){ const [sx,sy]=POS[sf]; const col=HOUSE_COLORS[state.holdings[sf].ownerHouseId]||"#333"; overlay+=`<line class="flow" x1="${sx}" y1="${sy}" x2="${tx}" y2="${ty}" stroke="${col}" stroke-width="3.5" marker-end="url(#ah)"/>`; } overlay+=`<text class="pop" x="${tx}" y="${ty-30}" text-anchor="middle" font-size="18">${e.captured?'🏴':'💥'}</text>`; }
    else if(e.type==="caravan"){ const [fx,fy]=POS[e.from],[gx,gy]=POS[e.to]; overlay+=`<line class="flow" x1="${fx}" y1="${fy}" x2="${gx}" y2="${gy}" stroke="#c8941f" stroke-width="3"/><text class="pop" x="${(fx+gx)/2}" y="${(fy+gy)/2-4}" text-anchor="middle" font-size="16">${e.intercepted?'❌':'🐫'}</text>`; } }
  return `<svg viewBox="0 0 360 295" class="map" role="img" aria-label="Carte"><defs><marker id="ah" markerWidth="7" markerHeight="7" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#444"/></marker></defs>${edges}${nodes}${overlay}</svg>`;
}

/* clics carte → ordres */
function onNodeClick(id){ if(recap||tab!=="conseil"||!state.houses[PLAYER].alive||state.tick>=SEASON_LENGTH)return;
  if(pendingMode){ const from=pendingFrom; if(pendingMode==="caravane")addOrder({type:"CARAVANE",params:{from,to:id,gold:Math.min(50,state.houses[PLAYER].gold)}}); else addOrder({type:"MARCHE",params:{from,to:id,soldiers:state.holdings[from].soldiers}}); return; }
  selectedHolding=id; render(); }
function addOrder(o){ if(selectedOrders.length>=3)return; selectedOrders.push({houseId:PLAYER,slot:selectedOrders.length,type:o.type,params:o.params}); selectedHolding=null; pendingMode=null; pendingFrom=null; showDiplo=false; SFX.add(); render(); }
function removeOrder(i){ selectedOrders.splice(i,1); render(); }
function startMode(m,from){ if(selectedOrders.length>=3)return; pendingMode=m; pendingFrom=from; selectedHolding=null; render(); }
function cancelPending(){ pendingMode=null; pendingFrom=null; render(); }
function marcheFromBest(t){ const adj=holdingsOf(state,PLAYER).filter(x=>neighbors(state,x.id).includes(t)).sort((a,b)=>b.soldiers-a.soldiers); if(adj.length)addOrder({type:"MARCHE",params:{from:adj[0].id,to:t,soldiers:adj[0].soldiers}}); }
function doLevee(){ if(selectedOrders.length>=3)return; const n=parseInt(prompt("Combien de guerriers lever ? (coûte autant de 🌾 et de <svg viewBox='0 0 16 16' width='13' height='13' style='vertical-align:-2px;display:inline-block'><circle cx='8' cy='8' r='7' fill='#e8b923' stroke='#9c6f12' stroke-width='1.5'/><circle cx='8' cy='8' r='3.3' fill='none' stroke='#9c6f12' stroke-width='1.2'/></svg>)","10")); if(n>0)addOrder({type:"LEVEE",params:{count:n}}); }
function toggleDiplo(){ showDiplo=!showDiplo; render(); }
function addDiplo(){ addOrder({type:"EMISSAIRE",params:{action:val("d-action"),treaty:val("d-treaty"),target:val("d-target")}}); }
function orderLabel(o){ const p=o.params; switch(o.type){ case"DEV":return `🏗️ Développer ${state.holdings[p.holding].name}`; case"FORTIFIE":return `🛡️ Fortifier ${state.holdings[p.holding].name}`; case"LEVEE":return `⚔️ Lever ${p.count} guerriers`; case"CARAVANE":return `🐫 Caravane ${state.holdings[p.from].name}→${state.holdings[p.to].name} (${p.gold}<svg viewBox='0 0 16 16' width='13' height='13' style='vertical-align:-2px;display:inline-block'><circle cx='8' cy='8' r='7' fill='#e8b923' stroke='#9c6f12' stroke-width='1.5'/><circle cx='8' cy='8' r='3.3' fill='none' stroke='#9c6f12' stroke-width='1.2'/></svg>)`; case"MARCHE":return `🗡️ Marcher ${p.soldiers}⚔️ ${state.holdings[p.from].name}→${state.holdings[p.to].name}`; case"EMISSAIRE":return `🕊️ ${p.action} · ${p.treaty} · ${houseName(p.target)}`; default:return o.type; } }

function resolveNight(){ if(mpOnline){ mpSubmit(); return; } const orders=selectedOrders.map((o,i)=>({houseId:PLAYER,slot:i,type:o.type,params:o.params})); const choice=eventChoice||EVENT_CHOICES[eventId()][0][0];
  lastInvalid=orders.filter(o=>!isOrderValid(state,o)).map(o=>ORDER_LABELS[o.type]||o.type);
  const me=state.houses[PLAYER]; const b={gold:me.gold,grain:me.grain,prestige:me.prestige,reputation:me.reputation,soldiers:totalSoldiers(state,PLAYER)};
  const r=resolveTick(state,{eventId:eventId(),eventChoices:{[PLAYER]:choice},orders}); fullLog=fullLog.concat(r.log); state=r.state; save();
  const m2=state.houses[PLAYER]; const a={gold:m2.gold,grain:m2.grain,prestige:m2.prestige,reputation:m2.reputation,soldiers:totalSoldiers(state,PLAYER)};
  recap={ deltas:{gold:a.gold-b.gold,grain:a.grain-b.grain,soldiers:a.soldiers-b.soldiers,prestige:a.prestige-b.prestige,reputation:a.reputation-b.reputation}, econ:r.econ&&r.econ[PLAYER], entries:r.log.filter(e=>e.public||e.houseId===PLAYER), events:r.events, playerCaptured:r.events.some(e=>e.type==="attack"&&e.captured&&e.by===PLAYER) };
  SFX.resolve(); if(recap.deltas.gold>0)setTimeout(SFX.coin,180); if(recap.events.some(e=>e.type==="attack"))setTimeout(SFX.clash,260); if(recap.playerCaptured)setTimeout(SFX.capture,480);
  clearTurn(); setTab("conseil"); window.scrollTo(0,0); }
function continueRecap(){ recap=null; render(); window.scrollTo(0,0); }
const ORDER_LABELS={ DEV:"🏗️ Développer", LEVEE:"⚔️ Lever", CARAVANE:"🐫 Caravane", MARCHE:"🗡️ Marche", FORTIFIE:"🛡️ Fortifier", EMISSAIRE:"🕊️ Émissaire" };

function render(){ const p=document.getElementById("panel"); if(tab==="conseil")p.innerHTML=renderConseil(); else if(tab==="carte")p.innerHTML=renderCarte(); else if(tab==="apprendre")p.innerHTML=renderTutorial(); else p.innerHTML=renderChronique(); }

function renderRecap(){ const d=recap.deltas; const chip=(k,ic)=>{const v=d[k];if(!v)return"";return `<span class="stat ${v>0?'pos':'neg'}">${ic} ${v>0?'+':''}${v}</span>`;};
  const chips=[chip('gold',ICON.gold),chip('grain',ICON.grain),chip('soldiers',ICON.soldiers),chip('prestige',ICON.prestige),chip('reputation',ICON.reputation)].filter(Boolean).join(" ")||"<small>Aucun changement notable.</small>";
  const ecn=recap.econ; const econLine = ecn ? `<div class="hint" style="margin:.25rem 0">📊 <b>Revenus</b> +${ecn.incomeGold} or, +${ecn.incomeGrain} grain · <b>Intendance</b> −${ecn.upkeep} grain${ecn.desertions?` · <span class="neg">⚠️ Famine : −${ecn.desertions} ⚔️ désertent</span>`:""}</div>` : "";
  const events=recap.entries.length?recap.entries.map(e=>`<li>${e.text}</li>`).join(""):"<li><small>Nuit calme.</small></li>";
  const inv=lastInvalid.length?`<div class="warn">⚠ Ordre(s) ignoré(s) : ${lastInvalid.join(", ")} (impossible : ressources ou cible non voisine).</div>`:""; lastInvalid=[];
  return `${recap.playerCaptured?confetti():''}<div class="card recap"><h2 style="border:none;margin-top:0">🌙 → ☀️ Résultats de la nuit</h2><div class="card">${renderMap(recap.events)}<div class="hint" style="text-align:center">Flèches = attaques · 🐫 = caravanes · 🏴 = capture · 💥 = combat</div></div><div style="margin:.4rem 0;font-size:1.05rem">${chips}</div>${econLine}<ul>${events}</ul>${inv}<button class="go" onclick="continueRecap()">Continuer ▶</button></div>`; }

function renderSeasonEnd(){ const board=Object.values(state.houses).slice().sort((a,b)=>b.prestige-a.prestige); const w=board[0]; const youWin=w.id===PLAYER;
  const rows=board.map((h,i)=>`<tr class="${h.id===PLAYER?'me-row':''}"><td>${i+1}</td><td>${dot(h.id)}${h.name}</td><td class="num">${h.prestige}</td><td><small>${AMBITIONS[h.ambition]?(h.ambitionDone?'<span class="pos">✓</span> ':'<span class="neg">✗</span> ')+AMBITIONS[h.ambition].name:'—'}</small></td></tr>`).join("");
  return `${confetti()}<div class="card recap"><h2 style="border:none;margin-top:0">🏁 Fin de la saison</h2><p style="font-size:1.1rem">${dot(w.id)}<b>${w.name}</b> l'emporte avec ${w.prestige} 👑.</p>${youWin?'<p><b>🎉 Victoire ! Ta lignée domine le Carrefour des Sables.</b></p>':'<p>Ta lignée perdure — la prochaine saison sera la tienne.</p>'}<table><tr><th>#</th><th>Maison</th><th class="num">👑</th><th>Ambition (révélée)</th></tr>${rows}</table><button class="go" onclick="newSeason()">Nouvelle saison ▶</button></div>`; }

function actionPanel(){ const me=state.houses[PLAYER]; const full=selectedOrders.length>=3;
  if(pendingMode){ const what=pendingMode==="caravane"?"la destination de ta caravane":("le lieu à attaquer (un voisin de "+state.holdings[pendingFrom].name+")"); return `<div class="card"><b>👉 Sur la carte, touche ${what}.</b><br><small>Cibles entourées : <span style="color:#1a7f37">✅ bon choix</span> · <span style="color:#cf222e">⚠️ risqué</span>.</small><br><button class="mini" onclick="cancelPending()">Annuler</button></div>`; }
  if(full) return `<div class="card"><small class="warn">3 ordres maximum. Lance la nuit, ou retire un ordre.</small></div>`;
  if(!selectedHolding) return `<div class="hint">👆 Touche un de <b>tes lieux</b> (cerclés d'or) pour agir, ou un lieu voisin pour l'attaquer.</div>`;
  const h=state.holdings[selectedHolding], mine=h.ownerHouseId===PLAYER, poor=me.gold<40;
  let btns;
  if(mine) btns=`<button class="mini" onclick="addOrder({type:'DEV',params:{holding:'${h.id}'}})" ${poor?'disabled':''}>🏗️ Développer (−40<svg viewBox='0 0 16 16' width='13' height='13' style='vertical-align:-2px;display:inline-block'><circle cx='8' cy='8' r='7' fill='#e8b923' stroke='#9c6f12' stroke-width='1.5'/><circle cx='8' cy='8' r='3.3' fill='none' stroke='#9c6f12' stroke-width='1.2'/></svg>)</button><button class="mini" onclick="addOrder({type:'FORTIFIE',params:{holding:'${h.id}'}})" ${poor?'disabled':''}>🛡️ Fortifier (−40<svg viewBox='0 0 16 16' width='13' height='13' style='vertical-align:-2px;display:inline-block'><circle cx='8' cy='8' r='7' fill='#e8b923' stroke='#9c6f12' stroke-width='1.5'/><circle cx='8' cy='8' r='3.3' fill='none' stroke='#9c6f12' stroke-width='1.2'/></svg>)</button><button class="mini" onclick="startMode('caravane','${h.id}')" ${me.gold<=0?'disabled':''}>🐫 Caravane d'ici</button><button class="mini" onclick="startMode('marche','${h.id}')" ${h.soldiers<=0?'disabled':''}>🗡️ Marcher d'ici (${h.soldiers}⚔️)</button>${poor?`<br><small class="warn">Pas assez d'or (40<svg viewBox='0 0 16 16' width='13' height='13' style='vertical-align:-2px;display:inline-block'><circle cx='8' cy='8' r='7' fill='#e8b923' stroke='#9c6f12' stroke-width='1.5'/><circle cx='8' cy='8' r='3.3' fill='none' stroke='#9c6f12' stroke-width='1.2'/></svg>) pour développer/fortifier.</small>`:''}`;
  else { const adj=holdingsOf(state,PLAYER).filter(x=>neighbors(state,x.id).includes(h.id)).sort((a,b)=>b.soldiers-a.soldiers); if(adj.length){ const src=adj[0],d=defPowerAt(h.id),win=src.soldiers>d; btns=`<button class="mini" onclick="marcheFromBest('${h.id}')">🗡️ Marcher depuis ${src.name} (${src.soldiers}⚔️ vs ${d} déf → ${win?'✅ probable':'⚠️ risqué'})</button>`; } else btns=`<small>Aucun de tes lieux n'est voisin de ce lieu.</small>`; }
  return `<div class="card"><b>${TYPE_ICON[h.type]} ${h.name}</b> — ${dot(h.ownerHouseId)}${houseName(h.ownerHouseId)} · ${h.soldiers}⚔️${h.fortification>0?` 🛡️${h.fortification}`:''}<br>${btns}</div>`; }

function renderConseil(){ if(recap) return renderRecap();
  if(state.tick>=SEASON_LENGTH) return renderSeasonEnd();
  const me=state.houses[PLAYER];
  if(!me.alive)return `<div class="card"><b>Ta Maison a été éliminée.</b><br><button class="go" onclick="reset()">Nouvelle partie</button></div>`;
  const night=fullLog.filter(e=>e.tick===state.tick-1&&(e.public||e.houseId===PLAYER));
  const brief = state.tick===0 ? "<li>Bienvenue au Carrefour des Sables. Touche tes lieux sur la carte pour donner des ordres.</li>" : (night.length?night.map(e=>`<li>${e.text}</li>`).join(""):"<li><small>Nuit calme — rien de notable.</small></li>");
  const myH=holdingsOf(state,PLAYER).map(h=>`${TYPE_ICON[h.type]} ${h.name} <small>(${h.soldiers}⚔️${h.fortification>0?` 🛡️${h.fortification}`:""})</small>`).join(" · ");
  const ecv=eventChoice||EVENT_CHOICES[eventId()][0][0];
  const choices=EVENT_CHOICES[eventId()].map(([v,l])=>`<label><input type="radio" name="evt" value="${v}" ${v===ecv?"checked":""} onclick="eventChoice='${v}'"> ${l}</label>`).join("");
  const pct=Math.round(state.tick/SEASON_LENGTH*100);
  const orders = selectedOrders.length? selectedOrders.map((o,i)=>`<div class="slot"><span>${orderLabel(o)}</span><button class="mini" onclick="removeOrder(${i})">✖</button></div>`).join("") : `<div class="hint">Aucun ordre. Tu peux résoudre sans ordre, ou en ajouter via la carte.</div>`;
  const diplo = showDiplo? `<div style="margin-top:.4rem"><select id="d-action"><option value="propose">proposer</option><option value="accept">accepter</option><option value="break">rompre</option></select> <select id="d-treaty"><option value="non_aggression">non-agression</option><option value="mutual_defense">défense mutuelle</option><option value="trade_pact">pacte commercial</option></select> avec <select id="d-target">${Object.values(state.houses).filter(h=>h.id!==PLAYER).map(h=>`<option value="${h.id}">${h.name}</option>`).join("")}</select> <button class="mini" onclick="addDiplo()">Ajouter</button></div>`:"";
  return `${mpBar()}<div class="card help"><b>👋 Comment jouer</b><br>Tu diriges la <b>Maison d'Aïssata</b>. Chaque tour : <b>①</b> réponds à l'événement · <b>②</b> <b>touche la carte</b> pour donner jusqu'à 3 ordres · <b>③</b> « Résoudre la nuit ». 🎯 But : finir la saison avec le plus de 👑.</div>
    <h2>${dot(PLAYER)}Maison d'Aïssata</h2>
    <div class="card" style="border-left:5px solid ${HOUSE_COLORS[PLAYER]}"><span class="stat">${ICON.gold} <b>${me.gold}</b></span><span class="stat">${ICON.grain} <b>${me.grain}</b></span><span class="stat">${ICON.prestige} <b>${me.prestige}</b></span>${state.tick>=DIPLO_UNLOCK?`<span class="stat">${ICON.reputation} <b>${me.reputation}</b></span>`:""}<br><small>Tes lieux : ${myH}</small><div style="margin-top:.3rem"><small>${actOf(state.tick).ic} <b>${actOf(state.tick).name}</b> · nuit ${state.tick} / ${SEASON_LENGTH}${actOf(state.tick).mult>1?' · 👑 prestige ×'+actOf(state.tick).mult:''}</small><div class="bar"><div style="width:${pct}%"></div></div></div></div>
    ${(function(){const amb=AMBITIONS[me.ambition];if(!amb)return"";const ok=amb.check(state,me);return '<div class="card" style="border-left:5px solid var(--gold)"><b>🎯 Ambition de ta lignée :</b> '+amb.name+' <small>— '+amb.desc+'</small> '+(ok?'<span class="pos">✓ en bonne voie</span>':'<span style="opacity:.65">(+50 👑 si accomplie en fin de saison)</span>')+'</div>';})()}
    <h2>🌙 Briefing de la nuit</h2><ul>${brief}</ul>
    <h2>① L'événement du jour — ${EVENTS[eventId()].name}</h2><div class="card"><small>Que décides-tu ?</small>${choices}</div>
    <h2>② Donne tes ordres <small>(touche la carte · ${selectedOrders.length}/3)</small></h2>
    <div class="card">${renderMap()}<div class="hint" style="text-align:center">${dot(PLAYER)}= toi · anneau doré = tes lieux</div></div>
    ${actionPanel()}
    ${state.tick===DIPLO_UNLOCK?`<div class="hint">🕊️ <b>Nouveau :</b> la diplomatie est maintenant disponible.</div>`:""}<div class="card"><b>Actions générales :</b> <button class="mini" onclick="doLevee()" ${selectedOrders.length>=3?'disabled':''}>⚔️ Lever des guerriers</button>${state.tick>=DIPLO_UNLOCK?`<button class="mini" onclick="toggleDiplo()" ${selectedOrders.length>=3?'disabled':''}>🕊️ Diplomatie</button>${diplo}`:""}</div>
    <div><b>📜 Tes ordres :</b>${orders}</div>
    <h2>③ Lance le tour</h2><button class="go" onclick="resolveNight()">Résoudre la nuit ▶</button>
    <p style="text-align:center"><small><a href="#" onclick="reset();return false">↺ Nouvelle partie</a></small></p>`; }

function renderCarte(){ const rows=Object.values(state.holdings).map(h=>`<tr class="${h.ownerHouseId===PLAYER?'me-row':''}"><td>${TYPE_ICON[h.type]} ${h.name}</td><td>${dot(h.ownerHouseId)}${houseName(h.ownerHouseId)}</td><td class="num">${h.soldiers}</td><td class="num">${h.fortification}</td><td><small>${neighbors(state,h.id).map(n=>state.holdings[n].name).join(", ")}</small></td></tr>`).join("");
  return `<h2>🗺️ Le Carrefour des Sables</h2><div class="card">${renderMap()}</div><table><tr><th>Lieu</th><th>Propriétaire</th><th class="num">⚔️</th><th class="num">🛡️</th><th>Voisins</th></tr>${rows}</table>`; }

function renderChronique(){ const board=Object.values(state.houses).slice().sort((a,b)=>b.prestige-a.prestige).map((h,i)=>`<tr class="${h.id===PLAYER?'me-row':''}"><td>${i+1}</td><td>${dot(h.id)}${h.name}${h.alive?"":" <small>(éliminée)</small>"}</td><td class="num">${h.prestige}</td><td class="num">${holdingsOf(state,h.id).length}</td></tr>`).join("");
  const hist=fullLog.filter(e=>e.public).slice().reverse().slice(0,40).map(e=>`<li><small>T${e.tick}</small> ${e.text}</li>`).join("")||"<li><small>(rien encore)</small></li>";
  return `<h2>🏆 Classement (par 👑)</h2><table><tr><th>#</th><th>Maison</th><th class="num">👑</th><th class="num">Lieux</th></tr>${board}</table><h2>📜 Chronique publique</h2><ul>${hist}</ul>`; }

let tutoStep=0;
function markSeen(){ try{ localStorage.setItem("lignees_seen_tuto_v1","1"); }catch(e){} }
function tutoNext(){ if(tutoStep<TUTORIAL.length-1){ tutoStep++; render(); window.scrollTo(0,0); } else tutoFinish(); }
function tutoPrev(){ if(tutoStep>0){ tutoStep--; render(); window.scrollTo(0,0); } }
function tutoGo(i){ tutoStep=i; render(); window.scrollTo(0,0); }
function tutoFinish(){ markSeen(); tutoStep=0; setTab("conseil"); }

 { title:"👑 Bienvenue, chef de dynastie", html:`<p>Tu diriges la <b>Maison d'Aïssata</b>, une dynastie marchande du <b>Carrefour des Sables</b> — une région de cités, d'oasis et de ports reliés par des routes caravanières.</p><p>🎯 <b>Le but :</b> à la fin de la saison (24 nuits), être la Maison qui possède le plus de <b>👑 Prestige</b>.</p><p>⚔️ <b>L'enjeu :</b> 5 autres Maisons veulent la même chose. On prospère par le <b>commerce</b>, les <b>alliances</b> et parfois la <b>ruse</b> — jamais par la vitesse des doigts.</p>` },
 { title:"🔄 Comment se joue un tour", html:`<p>Chaque tour (une « nuit ») se joue en 3 étapes :</p><p><b>①</b> tu réponds à l'<b>événement du jour</b> ;<br><b>②</b> tu donnes jusqu'à <b>3 ordres</b> en touchant la carte ;<br><b>③</b> tu cliques <b>« Résoudre la nuit »</b>.</p><p>Le monde avance alors : <b>toutes les Maisons agissent en même temps</b>, puis tu découvres les conséquences au matin.</p><p>⏳ <b>C'est au tour par tour :</b> pas besoin d'être rapide ni connecté à un moment précis. <b>Dormir ne te fait jamais perdre.</b></p>` },
 { title:"💰 Tes ressources", html:`<ul><li><svg viewBox='0 0 16 16' width='13' height='13' style='vertical-align:-2px;display:inline-block'><circle cx='8' cy='8' r='7' fill='#e8b923' stroke='#9c6f12' stroke-width='1.5'/><circle cx='8' cy='8' r='3.3' fill='none' stroke='#9c6f12' stroke-width='1.2'/></svg> <b>Or</b> — développer, lever des troupes, commercer.</li><li>🌾 <b>Grain</b> — nourrit ton peuple et <b>limite ton armée</b> (lever 1 guerrier coûte 1 grain + 1 or).</li><li>⚔️ <b>Guerriers</b> — défendent tes lieux et attaquent les autres.</li><li>👑 <b>Prestige</b> — <b>ton score</b> : c'est lui qui désigne le vainqueur.</li><li>🤝 <b>Réputation</b> — la confiance qu'on t'accorde. Honorer ses traités la fait monter ; trahir la fait chuter.</li></ul>` },
 { title:"🗺️ La carte & les lieux", html:()=>`<p>Voici le Carrefour. Chaque nœud est un lieu, <b>coloré par sa Maison</b> ; tes lieux sont <b>cerclés d'or</b>.</p>`+renderMap()+`<ul><li>🏛️ <b>Cité</b> : +20 <svg viewBox='0 0 16 16' width='13' height='13' style='vertical-align:-2px;display:inline-block'><circle cx='8' cy='8' r='7' fill='#e8b923' stroke='#9c6f12' stroke-width='1.5'/><circle cx='8' cy='8' r='3.3' fill='none' stroke='#9c6f12' stroke-width='1.2'/></svg>/nuit · 🌴 <b>Oasis</b> : +20 🌾/nuit · ⚓ <b>Port</b> : +15 <svg viewBox='0 0 16 16' width='13' height='13' style='vertical-align:-2px;display:inline-block'><circle cx='8' cy='8' r='7' fill='#e8b923' stroke='#9c6f12' stroke-width='1.5'/><circle cx='8' cy='8' r='3.3' fill='none' stroke='#9c6f12' stroke-width='1.2'/></svg> +10 🌾.</li><li>⚔️ = guerriers sur place · 🛡️ = fortification.</li><li>Les <b>traits</b> relient les <b>voisins</b> : on n'attaque et on ne commerce directement qu'entre lieux <b>voisins</b>.</li></ul>` },
 { title:"🎮 Donner des ordres (sur la carte)", html:`<p>Tu joues <b>en touchant la carte</b> :</p><ul><li>Touche <b>un de tes lieux</b> (cerclé d'or) → choisis 🏗️ <b>Développer</b>, 🛡️ <b>Fortifier</b>, 🐫 <b>Caravane d'ici</b> ou 🗡️ <b>Marcher d'ici</b>.</li><li>Pour une caravane ou une marche, touche ensuite <b>la destination</b>.</li><li>Touche un <b>lieu voisin ennemi</b> → bouton <b>« Marcher ici »</b>.</li><li>Sous la carte : ⚔️ <b>Lever</b> des guerriers, 🕊️ <b>Diplomatie</b>.</li></ul><p>Tes ordres s'empilent dans <b>📜 Tes ordres</b> (max 3) ; le ✖ en retire un. Tu peux aussi résoudre <b>sans aucun ordre</b>.</p>` },
 { title:"🐫 Le commerce — ta richesse de base", html:`<p>Une <b>caravane</b> envoie de l'or d'un de tes lieux vers un autre.</p><ul><li><b>Route sûre</b> (ne traverse que tes lieux, des alliés ou des neutres) → tu récupères ton or <b>+50 % de profit</b>.</li><li><b>Route hostile</b> (traverse un lieu ennemi gardé) → la caravane est <b>interceptée</b> ❌ et tu perds l'or !</li></ul><p>💡 <b>Enjeu :</b> contrôler les routes et avoir des <b>alliés</b> rend ton commerce sûr et rentable. C'est plus régulier — et bien moins risqué — que la guerre.</p>` },
 { title:"⚔️ La guerre — risquée, parfois décisive", html:`<p>Une <b>marche</b> envoie des guerriers attaquer un lieu <b>voisin</b>.</p><ul><li>Attaque = guerriers envoyés. Défense = guerriers sur place <b>× fortification</b> + <b>renforts d'alliés</b> voisins.</li><li>Le plus fort gagne ; le perdant perd l'essentiel de ses guerriers.</li><li>Si tu réduis la garnison à <b>0</b>, tu <b>captures le lieu</b> 🏴.</li></ul><p>💡 <b>Enjeu :</b> attaquer affaiblit les deux camps. Frappe quand tu es sûr de gagner, ou pour saisir un lieu mal défendu — pas par réflexe.</p>` },
 { title:"🕊️ Diplomatie & réputation — le cœur du jeu", html:`<p>Trois <b>traités</b> possibles :</p><ul><li><b>Non-agression</b> : on ne s'attaque pas (et vos routes deviennent sûres entre vous).</li><li><b>Défense mutuelle</b> : ton allié voisin <b>renforce ta défense</b>.</li><li><b>Pacte commercial</b> : sécurise le commerce entre vous.</li></ul><p>Tu peux <b>proposer</b>, <b>accepter</b> ou <b>rompre</b> un traité. ⚠️ <b>Rompre</b> est puissant (effet de surprise !) mais <b>affiché publiquement</b> et coûte <b>−10 🤝</b>. Une faible réputation effraie les alliés et te fait perdre du prestige.</p><p>💡 <b>Enjeu :</b> tes alliances sont à la fois ton bouclier et ton réseau commercial. La confiance est une monnaie.</p>` },
 { title:"🌙 L'événement du jour", html:`<p>Chaque nuit, un <b>événement</b> touche toute la région (sécheresse, grande foire…). Tu choisis ta réaction — souvent un <b>dilemme</b> : lors de l'Harmattan, <b>partager</b> ton grain (+🤝, −🌾) ou le <b>thésauriser</b> ?</p><p>💡 <b>Enjeu :</b> les choix de <b>toutes</b> les Maisons s'additionnent et changent le monde du lendemain. Coopérer… ou profiter.</p>` },
 { title:"🏆 Gagner — et bien jouer", html:`<p>Tu gagnes du <b>👑 Prestige</b> chaque nuit en : tenant des <b>lieux</b>, faisant des <b>profits commerciaux</b>, <b>honorant tes traités</b>, <b>défendant</b> avec succès et <b>capturant</b> des lieux. Bonne réputation = bonus.</p><p><b>Conseils de stratégie :</b></p><ul><li>💰 <b>Le commerce d'abord</b> : ta richesse de base, peu risquée.</li><li>🤝 <b>Allie-toi tôt</b> : sécurise tes routes et tes frontières.</li><li>⚔️ <b>La guerre à bon escient</b> : sur une cible faible ou pour un gain clair.</li><li>⚖️ <b>Équilibre</b> économie, armée et diplomatie — aucune Maison ne gagne sur un seul pilier.</li></ul>` },
 { title:"À toi de jouer ! 🐫", html:`<p>Tu sais l'essentiel. Souviens-toi : <b>① événement · ② jusqu'à 3 ordres sur la carte · ③ résoudre la nuit.</b></p><p>🎯 Vise le plus de 👑 en 24 nuits. Tu peux relire ce tutoriel à tout moment via l'onglet <b>📖 Apprendre</b>.</p><p>Bonne chance, chef de dynastie.</p>` },
];
function renderTutorial(){ const c=TUTORIAL[tutoStep], n=TUTORIAL.length; const body=typeof c.html==="function"?c.html():c.html;
  const dots=TUTORIAL.map((_,i)=>`<span onclick="tutoGo(${i})" style="cursor:pointer">${i===tutoStep?"●":"○"}</span>`).join(" ");
  return `<div class="card help"><b>📖 Tutoriel</b> — étape ${tutoStep+1} / ${n} &nbsp;·&nbsp; <a href="#" onclick="tutoFinish();return false">passer ▶</a></div>
    <div class="card"><h2 style="margin-top:0;border:none">${c.title}</h2>${body}</div>
    <div style="display:flex;gap:.5rem;align-items:center;margin-top:.4rem"><button class="mini" onclick="tutoPrev()" ${tutoStep===0?"disabled":""}>◀ Précédent</button><div style="flex:1;text-align:center;font-size:1.1rem;letter-spacing:.2em">${dots}</div><button class="go" style="width:auto;margin:0;padding:.55rem 1rem" onclick="tutoNext()">${tutoStep===n-1?"Jouer ▶":"Suivant ▶"}</button></div>`; }

load();
let _seen=false; try{ _seen=localStorage.getItem("lignees_seen_tuto_v1")==="1"; }catch(e){}
tab=_seen?"conseil":"apprendre";
for(const x of ["conseil","carte","chronique","apprendre"]){ const b=document.getElementById("tab-"+x); if(b)b.classList.toggle("active",x===tab); }
render();
</script>
</body>
