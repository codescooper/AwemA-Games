<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Classements — AwemA</title>
<style>
  :root { color-scheme: dark; --gold:#f0c64a; --vio:#7c5cff; }
  * { box-sizing: border-box; }
  body { font-family: system-ui,-apple-system,sans-serif; margin:0; min-height:100vh; color:#f3ece0;
    background: radial-gradient(1100px 600px at 50% -10%, #2a1f3a, #0c0a14 62%); display:flex; flex-direction:column; align-items:center; padding:1rem .8rem 3rem; }
  a { color:#cdbcff; }
  .top { width:100%; max-width:920px; display:flex; align-items:center; gap:.7rem; flex-wrap:wrap; }
  .top h1 { font-size:clamp(1.3rem,4.5vw,2rem); margin:.2rem 0; }
  .top .sp { flex:1; }
  .tbtn { font:inherit; color:#fff; background:#ffffff14; border:1px solid #ffffff2e; border-radius:.5rem; padding:.35rem .6rem; cursor:pointer; text-decoration:none; font-size:.85rem; }
  .tbtn:hover { background:#ffffff24; }
  .wrap { width:100%; max-width:920px; display:flex; flex-direction:column; gap:1rem; margin-top:.6rem; }
  .card { background:#ffffff0c; border:1px solid #ffffff1c; border-radius:.9rem; padding:1rem 1.1rem; }
  .me { display:flex; gap:1rem; align-items:center; flex-wrap:wrap; background:linear-gradient(160deg,#2a2150,#171130); border-color:#7c5cff55; }
  .ava { width:64px; height:64px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:2rem;
    background:radial-gradient(circle at 35% 30%, #ffd98a, #c8941f); color:#2a1c04; box-shadow:inset 0 -3px 8px #0005; }
  .me .who { font-size:1.3rem; font-weight:800; }
  .me .pen { font-size:.8rem; opacity:.7; cursor:pointer; margin-left:.4rem; }
  .me .tier { color:var(--gold); font-weight:700; }
  .me .idx { margin-left:auto; text-align:right; }
  .me .idx b { font-size:2rem; color:var(--gold); line-height:1; font-variant-numeric:tabular-nums; }
  .me .idx small { opacity:.7; }
  h2 { font-size:1rem; margin:.2rem 0 .6rem; opacity:.85; letter-spacing:.5px; }
  .break { display:flex; flex-direction:column; gap:.45rem; }
  .brow { display:flex; align-items:center; gap:.6rem; font-size:.9rem; }
  .brow .nm { width:120px; flex-shrink:0; } .brow .nm .ic { margin-right:.3rem; }
  .brow .track { flex:1; height:9px; background:#0007; border:1px solid #ffffff1c; border-radius:5px; overflow:hidden; }
  .brow .track > i { display:block; height:100%; width:0; background:linear-gradient(90deg,var(--vio),var(--gold)); }
  .brow .val { width:118px; text-align:right; font-variant-numeric:tabular-nums; opacity:.85; font-size:.82rem; }
  .brow.todo { opacity:.45; }
  table { width:100%; border-collapse:collapse; font-size:.92rem; }
  th,td { padding:.4rem .5rem; text-align:left; border-bottom:1px solid #ffffff12; }
  th { font-size:.74rem; text-transform:uppercase; letter-spacing:1px; opacity:.55; }
  td.r { text-align:right; font-variant-numeric:tabular-nums; }
  tr.self { background:#7c5cff22; }
  tr.self td { font-weight:700; }
  .medal { width:1.6rem; display:inline-block; }
  .tabs { display:flex; gap:.4rem; flex-wrap:wrap; margin-bottom:.6rem; }
  .tab { font:inherit; cursor:pointer; background:#ffffff10; border:1px solid #ffffff22; border-radius:1rem; padding:.3rem .7rem; font-size:.85rem; color:#f3ece0; }
  .tab.on { background:var(--gold); color:#2a1c04; border-color:transparent; font-weight:800; }
  .note { font-size:.8rem; opacity:.6; line-height:1.5; text-align:center; }
  .pill { display:inline-block; font-size:.7rem; background:#ffffff18; border:1px solid #ffffff2e; border-radius:1rem; padding:.05rem .5rem; opacity:.8; }
</style>
  <script src="../catalog.js"></script>
  <script src="../shared/awema.js"></script>
  <script src="../shared/analytics.js"></script>
</head>
<body>
  <div class="top">
    <h1>🏆 Le Grand Conseil <span class="pill">classements</span></h1>
    <span class="sp"></span>
    <span class="pill" id="netBadge" title="Classement mondial via le serveur AwemA ; repli local hors-ligne">🟢 en ligne</span>
    <button class="tbtn" id="syncBtn" onclick="render()">🔄 Synchroniser</button>
    <a class="tbtn" href="../index.html">≡ Cabinet</a>
  </div>

  <div class="wrap">
    <div class="card me" id="meCard"></div>

    <div class="card">
      <h2>👑 Classement général — Indice AwemA</h2>
      <table id="globalTable"></table>
    </div>

    <div class="card">
      <h2>🎮 Classement par jeu</h2>
      <div class="tabs" id="tabs"></div>
      <table id="gameTable"></table>
    </div>

    <div class="note" id="footnote"></div>
  </div>

<script>
/* LE GRAND CONSEIL — classements AwemA. La logique (GAMES, Indice, paliers,
   client Cloud→Net→Sim) est promue dans shared/awema.js ; la LISTE des jeux est
   dérivée du catalogue unique (catalog.js). Aucune liste codée en dur ici. */
addEventListener("error", ev=>{ try{ let d=document.getElementById("errband");
  if(!d){ d=document.createElement("div"); d.id="errband"; d._n=0;
    d.style.cssText="position:fixed;left:8px;top:8px;right:8px;z-index:99;background:#5a1410;color:#ffd9d0;border:1px solid #ff6b6b;border-radius:8px;padding:8px 10px;font:13px/1.4 system-ui;white-space:pre-wrap";
    document.body.appendChild(d); }
  d._n++; d.textContent="⛔ Erreur"+(d._n>1?" ×"+d._n:"")+" : "+(ev.message||"inconnue"); }catch(e){} });

const esc = AWEMA.esc;
const TIERS = AWEMA.TIERS, tierOf = AWEMA.tierOf, indiceOf = AWEMA.indiceOf, Cloud = AWEMA.board, BACKEND_URL = AWEMA.BACKEND_URL;
const GAMES = AWEMA.GAMES.filter(g=>g.score).map(g=>({ id:g.id, name:g.name, ic:g.emoji, unit:g.score.unit, target:g.score.target, fmt:v=>AWEMA.fmtScore(g,v), read:()=>AWEMA.readScore(g) }));
const maitrise=(g,score)=>AWEMA.clamp(score/g.target,0,1);
const gamePoints=(g,score)=>Math.round(maitrise(g,score)*1000);
const myName=()=>AWEMA.name();
function setName(){ AWEMA.promptName(()=>render()); }
function myScores(){ return AWEMA.localScores(); }

let curTab = GAMES[0].id;
const MEDAL=["🥇","🥈","🥉"];
async function render(){
  const sb=document.getElementById("syncBtn"); if(sb){ sb.disabled=true; sb.textContent="🔄 …"; }
  AWEMA.resetOnline();
  const scores=myScores(), idx=indiceOf(scores), tier=tierOf(idx);
  const next=TIERS.find(t=>t.min>idx);
  document.getElementById("meCard").innerHTML=`
    <div class="ava">${tier.ic}</div>
    <div>
      <div class="who">${esc(myName())}<span class="pen" onclick="setName()">✏️ changer</span></div>
      <div class="tier">${tier.ic} ${tier.name}</div>
      ${next?`<div class="pill">${next.min-idx} pts → ${next.ic} ${next.name}</div>`:`<div class="pill">rang maximal atteint 🌟</div>`}
    </div>
    <div class="idx"><b>${idx}</b><br><small>Indice AwemA</small></div>`;
  let bd='<div class="break">';
  for(const g of GAMES){ const sc=scores[g.id]||0, pts=gamePoints(g,sc);
    bd+=`<div class="brow"><div class="nm"><span class="ic">${g.ic}</span>${g.name}</div>
      <div class="track"><i style="width:${maitrise(g,sc)*100}%"></i></div>
      <div class="val">${sc?g.fmt(sc):"—"} · ${pts} pts</div></div>`; }
  bd+='</div>';
  document.getElementById("meCard").insertAdjacentHTML("beforeend", bd);
  await Cloud.submit(myScores());
  const Gb=await Cloud.global();
  let gt="<tr><th>#</th><th>Joueur</th><th>Rang</th><th class='r'>Indice</th></tr>";
  Gb.forEach((p,i)=>{ gt+=`<tr class="${p.self?'self':''}"><td><span class="medal">${MEDAL[i]||(i+1)}</span></td><td>${esc(p.name)}</td><td>${p.tier.ic} ${p.tier.name}</td><td class="r">${p.idx}</td></tr>`; });
  document.getElementById("globalTable").innerHTML=gt;
  document.getElementById("tabs").innerHTML=GAMES.map(g=>`<button class="tab ${g.id===curTab?'on':''}" onclick="pickTab('${g.id}')">${g.ic} ${g.name}</button>`).join("");
  const g=GAMES.find(x=>x.id===curTab), B=await Cloud.game(curTab);
  let bt=`<tr><th>#</th><th>Joueur</th><th class='r'>Meilleur (${g.unit})</th></tr>`;
  B.forEach((p,i)=>{ bt+=`<tr class="${p.self?'self':''}"><td><span class="medal">${MEDAL[i]||(i+1)}</span></td><td>${esc(p.name)}</td><td class="r">${p.score?g.fmt(p.score):"—"}</td></tr>`; });
  document.getElementById("gameTable").innerHTML=bt;
  const _badge=document.getElementById("netBadge"), on=AWEMA.isOnline();
  if(on===true){
    if(_badge){ _badge.textContent="🟢 en ligne"; _badge.title="Connecté au serveur AwemA (Railway)"; }
    document.getElementById("footnote").innerHTML=`L'<b>Indice AwemA</b> = somme de ta maîtrise (0–1000 pts) sur les ${GAMES.length} jeux — joue à plus de jeux et bats tes records.<br>🌍 <span class="pill">mondial</span> Classement <b>en ligne réel</b> : tes scores et ceux des autres joueurs sont partagés via le serveur AwemA (Railway).`;
  } else {
    if(_badge){ _badge.textContent=BACKEND_URL?"🟡 hors-ligne — local":"🟢 local (démo)"; _badge.title=BACKEND_URL?"Serveur injoignable : classement local de secours":"Mode démonstration local"; }
    document.getElementById("footnote").innerHTML=`L'<b>Indice AwemA</b> = somme de ta maîtrise (0–1000 pts) sur les ${GAMES.length} jeux — joue à plus de jeux et bats tes records.<br>🔌 <span class="pill">${BACKEND_URL?"hors-ligne":"démo"}</span> ${BACKEND_URL?"Serveur injoignable — classement local de secours (tes scores partiront en ligne au retour du réseau).":"Classement local de démonstration (bots qui progressent)."}`;
  }
  if(sb){ sb.disabled=false; sb.textContent="🔄 Synchroniser"; }
}
function pickTab(id){ curTab=id; render(); }
render();
</script>
</body>
</html>
