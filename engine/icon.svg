<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="AwemA">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffa23c"/>
      <stop offset=".5" stop-color="#9a3f7a"/>
      <stop offset="1" stop-color="#221036"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="40%" r="44%">
      <stop offset="0" stop-color="#ffe39a" stop-opacity=".9"/>
      <stop offset="1" stop-color="#ffe39a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- fond plein cadre (zone sûre maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="208" r="156" fill="url(#halo)"/>
  <!-- crête / rayons -->
  <g fill="#e7b85a" stroke="#2a1430" stroke-width="6" stroke-linejoin="round">
    <path d="M256 96 l28 56 -56 0 z"/>
    <path d="M198 110 l18 48 -42 8 z"/>
    <path d="M314 110 l-18 48 42 8 z"/>
  </g>
  <!-- visage (masque) -->
  <path d="M256 138 c72 0 102 64 102 142 c0 84 -46 150 -102 150 c-56 0 -102 -66 -102 -150 c0 -78 30 -142 102 -142 z"
        fill="#f4e9cb" stroke="#2a1430" stroke-width="8" stroke-linejoin="round"/>
  <!-- arête du nez -->
  <rect x="247" y="246" width="18" height="92" rx="9" fill="#cda86a"/>
  <!-- yeux, bouche -->
  <g fill="#2a1430">
    <ellipse cx="212" cy="252" rx="29" ry="13"/>
    <ellipse cx="300" cy="252" rx="29" ry="13"/>
    <ellipse cx="256" cy="360" rx="27" ry="12"/>
  </g>
  <!-- scarifications -->
  <g stroke="#b98a52" stroke-width="6" stroke-linecap="round">
    <path d="M188 296 l28 10"/>
    <path d="M324 296 l-28 10"/>
  </g>
</svg>
