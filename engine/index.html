<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AwemA — Borne d'arcade</title>
<!-- PWA : installable + hors-ligne (actif en http(s)/localhost ; sans effet en file://) -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#e8702a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="AwemA" />
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="icon.svg" />
<style>
  :root { color-scheme: dark; --acc:#e8702a; --gold:#f0c64a; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; margin: 0; min-height: 100vh; color: #eee;
         background: radial-gradient(1200px 600px at 50% -8%, #1c2b3a, #0a0d14 62%); }
  a { color: inherit; text-decoration: none; }
  /* ── Enseigne (marquee) ── */
  .marquee { overflow: hidden; border-bottom: 1px solid #ffffff1a; background: linear-gradient(180deg,#160f24,#0c0d16);
             box-shadow: 0 0 40px #e8702a22 inset; }
  .marquee .run { display: inline-block; white-space: nowrap; padding: .5rem 0; font-weight: 900; letter-spacing: .35em;
                  font-size: 1rem; color: #ffd9a8; text-shadow: 0 0 12px #e8702a88; animation: slide 22s linear infinite; }
  @keyframes slide { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  /* ── Barre profil ── */
  .bar { position: sticky; top: 0; z-index: 6; display: flex; gap: .6rem; align-items: center; flex-wrap: wrap;
         padding: .55rem .9rem; background: #0a0d14e6; border-bottom: 1px solid #ffffff14; backdrop-filter: blur(8px); }
  .bar .brand { font-size: 1.15rem; font-weight: 900; letter-spacing: .5px; }
  .bar .brand small { font-weight: 600; opacity: .55; letter-spacing: .25em; font-size: .62rem; display:block; margin-top:-2px; }
  .bar .sp { flex: 1; }
  .chip { font-size: .82rem; background: #ffffff14; border: 1px solid #ffffff24; border-radius: 1rem; padding: .3rem .7rem; cursor: pointer; white-space: nowrap; }
  .chip:hover { background: #ffffff22; }
  .chip b { color: var(--gold); font-variant-numeric: tabular-nums; }
  .chip .tier { margin-left: .2rem; }
  .iconbtn { font: inherit; background: #ffffff14; border: 1px solid #ffffff24; border-radius: .55rem; padding: .3rem .55rem; cursor: pointer; color: #fff; }
  .iconbtn:hover { background: #ffffff22; }
  /* ── Catégories & cartes ── */
  main { max-width: 1000px; margin: 0 auto; padding: 1rem 1rem 3rem; }
  .cat { margin: 1.4rem 0 .4rem; display: flex; align-items: center; gap: .5rem; font-size: .82rem; text-transform: uppercase; letter-spacing: 1.6px; opacity: .6; }
  .cat::after { content: ""; flex: 1; height: 1px; background: #ffffff14; }
  .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); }
  .card { position: relative; border-radius: 1rem; padding: 1.2rem 1.15rem 1rem; border: 1px solid #ffffff1f; overflow: hidden;
          display: flex; flex-direction: column; min-height: 196px; transition: transform .14s ease, box-shadow .14s ease, border-color .14s ease; }
  .card:hover, .card:focus-visible { transform: translateY(-4px); box-shadow: 0 14px 40px #0009; outline: none; }
  .card .emoji { font-size: 2.4rem; line-height: 1; }
  .card h2 { margin: .6rem 0 .15rem; font-size: 1.18rem; }
  .card .tag { font-size: .72rem; text-transform: uppercase; letter-spacing: 1.2px; opacity: .7; display: flex; gap: .4rem; flex-wrap: wrap; }
  .card p { font-size: .87rem; line-height: 1.42; opacity: .9; margin: .5rem 0 .9rem; flex: 1; }
  .card .cta { align-self: flex-start; font-weight: 800; padding: .45rem .85rem; border-radius: .55rem; font-size: .9rem; background: #ffffff1c; }
  .badge { position: absolute; top: .8rem; right: .8rem; font-size: .62rem; font-weight: 800; padding: .18rem .5rem; border-radius: 1rem; letter-spacing: .5px; }
  .badge.mp { background: #2fd6a6; color: #04231d; } .badge.new { background: #ff5b6e; color: #fff; }
  /* thèmes (repris des cartes d'origine) */
  .t-voraces { background:linear-gradient(160deg,#0e2b2a,#07181c); border-color:#2fd6a644; } .t-voraces .cta{background:#2fd6a6;color:#04231d}
  .t-lignees { background:linear-gradient(160deg,#3a2f1d,#241b10); border-color:#c8941f44; } .t-lignees .cta{background:#c8941f;color:#221a0c}
  .t-sables { background:linear-gradient(160deg,#3a2a18,#241710); border-color:#a8631f55; } .t-sables .cta{background:#a8631f;color:#fff2e0}
  .t-echecs { background:linear-gradient(160deg,#3a2412,#14240f); border-color:#e8702a55; } .t-echecs .cta{background:#e8702a;color:#2a1604}
  .t-atelier { background:linear-gradient(160deg,#241d3a,#14111f); border-color:#7c5cff55; } .t-atelier .cta{background:#7c5cff;color:#100c1f}
  .t-harmattan { background:linear-gradient(160deg,#3a1a10,#1f0f1e); border-color:#e8702a55; } .t-harmattan .cta{background:linear-gradient(180deg,#ffb24d,#e8702a);color:#2a1404}
  .t-banco { background:linear-gradient(160deg,#3a2a14,#1c1208); border-color:#c89a6455; } .t-banco .cta{background:#c89a64;color:#2a1808}
  .t-awale { background:linear-gradient(160deg,#241c44,#120e24); border-color:#7c5cff55; } .t-awale .cta{background:#f0c64a;color:#2a1c04}
  .t-oware { background:linear-gradient(160deg,#3a2912,#18100a); border-color:#c8884455; } .t-oware .cta{background:#e8a85a;color:#2a1804}
  .t-tamtam { background:linear-gradient(160deg,#2a1a38,#160d1e); border-color:#ff9a5055; } .t-tamtam .cta{background:linear-gradient(180deg,#ffb24d,#e8702a);color:#2a1404}
  .t-classement { background:linear-gradient(160deg,#3a2f12,#16110a); border-color:#f0c64a55; } .t-classement .cta{background:#f0c64a;color:#2a1c04}
  .t-place { background:linear-gradient(160deg,#1d3320,#0e1a10); border-color:#13875a66; } .t-place .cta{background:#13875a;color:#eafff4}
  .t-village { background:linear-gradient(160deg,#3a2a14,#15240f); border-color:#c89a4a66; } .t-village .cta{background:#c89a4a;color:#2a1c04}
  .install { font: inherit; font-weight: 800; cursor: pointer; background: var(--acc); color: #2a1404; border: 0; border-radius: .55rem; padding: .35rem .8rem; }
  footer { text-align: center; opacity: .55; font-size: .8rem; line-height: 1.8; margin-top: 2rem; }
  footer a { color: #9fd0ff; }
  /* ── Mode attractif ── */
  #attract { position: fixed; inset: 0; z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center;
             background: radial-gradient(800px 500px at 50% 40%, #1c2b3aee, #06080df7); text-align: center; cursor: pointer; }
  #attract.on { display: flex; }
  #attract .big { font-size: 5rem; line-height: 1; filter: drop-shadow(0 0 24px #0008); animation: pop .5s ease; }
  #attract h3 { font-size: 1.7rem; margin: .8rem 0 .2rem; }
  #attract p { opacity: .8; max-width: 30rem; padding: 0 1rem; }
  #attract .hint { position: absolute; bottom: 2rem; font-size: .85rem; opacity: .6; letter-spacing: .1em; animation: blink 1.4s infinite; }
  @keyframes pop { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes blink { 50% { opacity: .15; } }
  @media (prefers-reduced-motion: reduce){ .marquee .run{ animation:none } #attract .big{ animation:none } #attract .hint{ animation:none } }
</style>
  <script src="catalog.js"></script>
  <script src="shared/awema.js"></script>
  <script src="shared/analytics.js"></script>
</head>
<body>
  <div class="marquee"><span class="run" id="run"></span></div>

  <div class="bar">
    <div class="brand">🎮 AwemA<small>BORNE D'ARCADE</small></div>
    <span class="sp"></span>
    <span class="chip" id="profile" title="Changer mon pseudo">👤 …</span>
    <a class="chip" href="games/classements.html" title="Classements">🏆 Rangs</a>
    <button class="iconbtn" id="soundBtn" title="Son">🔇</button>
    <button class="install" id="installBtn" hidden>⬇️ Installer</button>
  </div>

  <main id="catalog"></main>

  <footer>
    <span id="ver"></span> · <a href="games/atelier.html">🎓 Apprendre à créer les jeux</a> · <a href="games/idees.html">💡 Proposer un jeu</a><br>
    <a href="games/prototype.html">🔧 Vérifier le moteur Lignées</a> · 100% local & hors-ligne · <a href="https://github.com/codescooper/AwemA-Games">code (AGPL-3.0)</a>
  </footer>

  <div id="attract" aria-hidden="true">
    <div class="big" id="aEmoji">🎮</div>
    <h3 id="aName"></h3>
    <p id="aTag"></p>
    <div class="hint">▶ touche / clique pour jouer</div>
  </div>

<script>
(function () {
  var G = (window.AWEMA && AWEMA.GAMES) || [];
  var CATS = (window.AWEMA && AWEMA.CATEGORIES) || [];

  /* ----- enseigne défilante ----- */
  var live = G.filter(function (g) { return g.status === "live"; });
  var run = live.map(function (g) { return g.emoji + " " + g.name; }).join("     ✦     ");
  document.getElementById("run").textContent = "✦  " + run + "     ✦     " + run + "  ";
  document.getElementById("ver").textContent = "AwemA v" + ((window.AWEMA && AWEMA.VERSION) || "0.1.0");

  /* ----- barre profil ----- */
  function refreshProfile() {
    var idx = 0, tier = { ic: "🥾", name: "Voyageur" };
    try { idx = AWEMA.indiceOf(AWEMA.localScores()); tier = AWEMA.tierOf(idx); } catch (e) {}
    var el = document.getElementById("profile");
    el.innerHTML = "👤 " + AWEMA.esc(AWEMA.name()) + " · <b>" + idx + "</b> <span class='tier'>" + tier.ic + "</span>";
    el.title = tier.name + " · Indice " + idx + " — clique pour changer ton pseudo";
  }
  document.getElementById("profile").onclick = function () { AWEMA.promptName(function () { refreshProfile(); }); };
  refreshProfile();

  /* ----- rendu des catégories + cartes ----- */
  function badge(g) {
    var b = "";
    if (g.badge === "NOUVEAU") b += '<span class="badge new">NOUVEAU</span>';
    else if (g.multiplayer === "duel") b += '<span class="badge mp">DUEL</span>';
    else if (g.multiplayer === "presence") b += '<span class="badge mp">EN LIGNE</span>';
    return b;
  }
  function cta(g) { return g.status === "hub" ? "Entrer ▶" : g.status === "tool" ? "Ouvrir ▶" : "Jouer ▶"; }
  var mainEl = document.getElementById("catalog"), html = "";
  CATS.forEach(function (c) {
    var items = G.filter(function (g) { return g.category === c.id && g.status !== "archived"; });
    if (!items.length) return;
    html += '<div class="cat">' + c.emoji + " " + c.label + "</div><div class=\"grid\">";
    items.forEach(function (g) {
      var mp = g.multiplayer === "duel" ? "Multijoueur · duel" : g.multiplayer === "presence" ? "Multijoueur · présence" : "Solo";
      html += '<a class="card t-' + (g.theme || "classement") + '" href="' + g.file + '">' + badge(g) +
        '<div class="emoji">' + g.emoji + "</div>" +
        "<h2>" + AWEMA.esc(g.name) + "</h2>" +
        '<div class="tag">' + mp + "</div>" +
        "<p>" + AWEMA.esc(g.tagline || "") + "</p>" +
        '<span class="cta">' + cta(g) + "</span></a>";
    });
    html += "</div>";
  });
  mainEl.innerHTML = html;

  /* ----- son optionnel (défaut OFF, gesture-gated) ----- */
  var SND_KEY = "awema_sound", sound = (AWEMA.lsGet(SND_KEY) === "1"), actx = null;
  var sbtn = document.getElementById("soundBtn");
  function paint() { sbtn.textContent = sound ? "🔊" : "🔇"; sbtn.title = sound ? "Son activé" : "Son coupé"; }
  paint();
  sbtn.onclick = function () { sound = !sound; AWEMA.lsSet(SND_KEY, sound ? "1" : "0"); paint(); if (sound) blip(660, .06); };
  function blip(f, d) { if (!sound) return; try { actx = actx || new (window.AudioContext || window.webkitAudioContext)();
    var o = actx.createOscillator(), g2 = actx.createGain(); o.type = "triangle"; o.frequency.value = f;
    g2.gain.value = .04; o.connect(g2); g2.connect(actx.destination); o.start(); g2.gain.setTargetAtTime(0, actx.currentTime + (d || .05), .04); o.stop(actx.currentTime + .25); } catch (e) {} }
  document.querySelectorAll(".card").forEach(function (c) { c.addEventListener("mouseenter", function () { blip(520, .04); }); });

  /* ----- mode attractif (aperçus à l'inactivité) ----- */
  var att = document.getElementById("attract"), idleT = null, cycT = null, i = 0;
  function showAttract() {
    if (!live.length) return;
    att.classList.add("on"); att.setAttribute("aria-hidden", "false");
    function step() { var g = live[i % live.length]; i++;
      document.getElementById("aEmoji").textContent = g.emoji;
      document.getElementById("aName").textContent = g.name;
      document.getElementById("aTag").textContent = g.tagline || ""; }
    step(); cycT = setInterval(step, 3000);
  }
  function hideAttract() { att.classList.remove("on"); att.setAttribute("aria-hidden", "true"); if (cycT) { clearInterval(cycT); cycT = null; } }
  function resetIdle() { if (idleT) clearTimeout(idleT); if (att.classList.contains("on")) hideAttract(); idleT = setTimeout(showAttract, 25000); }
  att.addEventListener("click", function () { hideAttract(); resetIdle(); });
  ["pointermove", "pointerdown", "keydown", "touchstart", "wheel"].forEach(function (ev) { addEventListener(ev, resetIdle, { passive: true }); });
  resetIdle();

  /* ----- PWA ----- */
  if ("serviceWorker" in navigator && location.protocol !== "file:")
    addEventListener("load", function () { navigator.serviceWorker.register("sw.js").catch(function () {}); });
  var deferred = null, ib = document.getElementById("installBtn");
  addEventListener("beforeinstallprompt", function (e) { e.preventDefault(); deferred = e; if (ib) ib.hidden = false; });
  if (ib) ib.onclick = function () { if (!deferred) return; deferred.prompt(); deferred.userChoice.finally(function () { deferred = null; ib.hidden = true; }); };
  addEventListener("appinstalled", function () { if (ib) ib.hidden = true; });
})();
</script>
</body>
</html>
